body:
  text: 正楊卷一明陳耀文撰旁羅史記黃帝順天地之紀旁羅日月星辰文選陸佐公新刻漏銘俯察旁羅登臺升庫尚書考靈耀曰冬至日月在牽牛一度求昏中者取六項加三旁蠡順餘之鄭元注曰盡行十二項中正而分之左右各六項也蠡猶羅也昏中在日前故言順數也明中在日後故言却也據此則旁羅乃測天度之器如今之日晷地羅也十二項者十二時分為十二方也此可補史記注之遺黃帝紀云迎日推䇿以治民順天地之紀時播百穀草木淳化鳥獸蟲蛾旁羅日月星辰水波土石金索隱曰旁非一方羅廣布也今按大戴禮作厯離離即羅也言帝德旁羅日月星辰水波及至土石金玉謂日月揚光海水不波山不藏珍皆是帝德廣布也前已云迎日推䇿矣又用蠡何為大戴之離亦可改作蠡乎水波土石金玉亦當用旁羅測之乎且鄭謂蠡猶羅豈以蠡為器乎𤣥囂唐詩春雲生嶺上積雪在囂間山凹之地堪為墟市者曰囂尚書序仲丁居於囂其地在陳留浚儀之間秦之敖倉也敖即囂也三川為天下之朝市故名曰敖左傳有囂氏之隧史記注青陽在青之陽𤣥囂在𤣥之囂梁宣帝七山寺賦神囂巖巖而特立仙的皎皎以孤臨皆以囂為地名也周禮司市之文云禁其鬭囂注鬭以力爭囂以口爭交市之地必多爭故禁之此益可證囂之為市其義所從來逺矣後世市謂之墟歸市曰趂墟言有人則囂無人則虛也蜀謂之場滇謂之街嶺南謂之務河北謂之集再考說文囂聲也氣出頭上故從㗊頁頁頭也左傳晏子之居近市湫隘囂塵杜預注囂聲也此尤可證囂之為市無疑藝林伐山云梁宣帝七山賦神囂云云以孤臨壑之凸凹者曰囂峯之尖射者曰的史記黃帝生二子其一曰𤣥囂是曰青陽注並無在𤣥之囂等語今妄為作注人名亦可分用乎又云仲丁遷於隞索隱云隞亦作囂括地志滎陽故城殷時敖地太康地記云秦建敖倉於成皋亦非陳留浚儀間也七山賦云山多寶玩器多瓊珍金玉生其陽琰石出其隂神篢巖巖而獨立仙的皎皎而孤臨孰知歲之豐儉覩𤣥白而皆諶字書云篢音公笠也此賦以神篢對仙的原非囂字今誤引之且一指為地名一注為壑之凸凹何自相繆戾也周禮司暴掌憲市之禁令禁其鬭囂與其暴亂者出入相陵犯者此云司市之文誤左昭三年初景公欲更晏子之宅曰子之宅近市湫隘囂塵不可以居請更諸爽塏者夫既曰近市矣復云湫隘囂塵乃以囂即為市何也若囂可為市則湫也隘也塵也皆可以為市矣舜梧堯桞藝林伐山宋文帝受命頌南通舜梧北平堯栁其句極工且新湘東王梁簡文法寶聨璧序云威漸黃支化行赤谷南通舜玉北平堯栁佛書四六謂出𢎞明集此云宋文帝受命頌一書而自相矛盾可疑也蒼梧事可用之受命頌中乎女匽大戴禮帝繫篇帝舜娶于帝堯之子謂之女匽氏列女傳堯之二女名娥皇女英山海經帝俊妻是生十日漢地里志陳倉有黃帝孫舜妻祠禮記舜葬于蒼梧之野蓋三妃未之從也堯典獨云二女而禮乃有三妃之文或謂女匽與皇英為三未知是否俊即古舜字山海經帝舜妻比登氏生宵明燭光一曰登北氏檀弓注疏集說引之並二妃為三書云釐降二女大戴謂女匽帝堯之子當是與劉向傳聞稍異耳欲以為三是與比登為四也山海經有女子名曰羲和方浴日于甘淵羲和者帝俊之妻生十日今以俊即古舜字止云帝俊妻而不言羲和是欲指為女匽耳不又為五妃乎又云有中容之國帝俊生中容郭璞注云俊亦舜字假借音也不云古字又云帝俊生后稷又云帝俊妻常羲生月十有二若云古字后稷便是舜子常羲又其一妻耶史帝紀注及郭璞山海注引禮止云舜葬蒼梧二妃不從而禮云三妃蓋世逺傳訛陶隂久誤必欲求其人以實之夏五郭公意耶思𤣥賦李善注引禮亦云二妃羿射日落九烏古傳言羿射日落九烏烏最難射一日落九烏言射之捷也而後世不得其說者遂以為射九日矣流俗謬說而傳怪文士循名而騁竒異哉羿射日烏景純山海經注詳辨之矣存而不論可也但以日落九烏為羿射之捷則大有可笑者帝王世紀云帝羿有窮氏與吳賀北遊賀使羿射雀曰生之乎殺之乎賀曰射其左目羿引弓射之誤中右目羿抑首而愧終身不忘故羿之善射至今稱之羿事不少槩見即此一節則日落九烏詎足以盡其技哉羿尚矣後世若拂蜻下鳥彈鵠集鳶賈堅不中為竒督君志射輒中則應弦而落物無不可者乃羿稱射烏未之前聞以射論子其殆强弓緩箭俱三十步之儔乎嵎夷既略說文略經略土地也左傳天子經略諸侯正封注聚土為封曰略經謂巡行略謂邊界即取土為封之略孟子所謂域民不以封疆之界是也後世不知略之為聚土陸詞黃公紹謂巡行為略失之逺矣巡行可以解經字而不可以解略字經略之云猶云防邊也猶云出塞也二字相聨為義若以略為巡行則謂邊云防禦謂塞為征行可乎略也邊也皆實字也邊塞字易明人皆知之略字義少隱故解者不以為實字而虛之轉解轉謬矣再考左傳中凡言略者皆謂聚土為封也如云侵敗王略又曰與之武功之略又曰吾將略地焉又曰略塞垣其義皆同尚書云嵎夷既略謂立邊防以界嵎夷正天子經略之事也孔頴達不識略字本義以為俗稱忽略簡略之略乃注云用功少曰略何其俗而且陋謬而可笑哉孟子曰此其大略也略字本喻言謂得其邊而未盡其中也亦猶莊子所謂道無封為是而有畛也郭象注云道無封故萬物得恣其分域妙得莊㫖孟子之言略猶莊之言封與畛也惜乎趙岐之注孟不能如郭象之注莊也乃曰大略大要也漢武紀殺略謂入界殺人龔遂傳劫略謂入界劫人今遂以略為劫史云智略輻湊蓋謂其智足以周知天下之略今遂以略為才智之稱假借譬喻逺失初意何異瞽者聽車輪之聲以為雷哉史記張良傳略地謂取其地而立我封疆也唐蒙傳略通夜郎謂通夜郎之略也古文簡奧如此若春秋書城楚丘疆鄆田文法也揚子法言云東溝大河南阻高山西采雍梁北鹵涇垠韓退之去邠操云將土我疆其文法皆本於春秋不知古人用字之法則不得古人立言之意人可不識字哉或曰兵法有黃公三略何義也曰略與韜對韜弓衣也義取藏器略封畛也義取固守決非簡略之略也若依集韻謬解因事生義謂略簡也少也行而取也才而智也則三略之名又將曰略書名矣用此以證略之為字愈益明趙充國傳圖上方略圖畫本也方進道也略邊界也注謂方略為計䇿亦謬此蓋剽韻會而操戈者不自知其繆更甚也就子所引聊為正之左昭七年芉尹無宇辭楚子曰天子經略諸侯正封古之制也注云經營天下略有四海不云聚土為封也成二年晉侯使鞏朔獻齊捷於周單襄公辭曰兄弟甥舅侵敗王略王命伐之注略經略法度非云界也夫晉之侵齊豈周界乎隱五年公矢魚於棠臧僖伯諌公曰吾將略地焉注略總攝巡行之名以上略字俱非聚土之意其武功之略訓界尚書禹貢海岱維青州嵎夷既略濰淄其道孔安國曰嵎夷地名用功少曰略馬融注亦同則注非始於孔頴達也且嵎夷青州何為立邊防以界之乎想見夷字即以為夷狄耳漢書二世元年陳涉遣武臣陳餘略趙地師古曰凡言略地者皆謂行而取之用功力少史記略地不獨張良傳有之俱無取其地而立我封疆之解唐蒙事見大宛傳略通夜郎見司馬相如傳及序傳今曰蒙傳豈古本史記耶孟子此其大略謂得其邊矣嘗聞其略亦可云得班爵祿之邊乎史項王本紀項梁教籍兵法籍大喜略知其意自序云為太史公書序略以拾遺補藝又豈邊界之云乎殺略謂入界殺人矣史大宛傳昆明之屬無君長善冦盜輒殺略漢使終莫能通又豈入界乎知略輻輳謂知足周天下之略矣史記酈生曰吾聞沛公慢而易人多大略真吾所願從逰蒯通說韓信曰勇略震主者身危而功蓋天下者不賞足下所謂功無二於天下而略不世出者也此豈沛公界之大淮隂界之猛乎三國志吳趙咨云吳王聰明雄略之主云云屈身於陛下是其略也豈吳王止於知魏之界乎晉載記王猛字景略可曰景界乎黃石公三略義取固守封略矣劉歆七略又將何所固守乎左宣十五年晉侯治兵於稷以略狄土注取也昭二十四年楚子為舟師以略吳疆注行也史記楚軍夜擊坑秦卒行略定秦地函谷關可謂非行而取乎趙充國傳圖上方略謂畫邊界矣首云為人有大略則此略又何物乎本傳亦無注晉書宗室傳高密王略字元簡張華傳或謂劉卞曰君才簡略堪大不堪小可謂簡略為非乎詩曰有略其耜俶載南畝注利也左定四年祝他對萇𢎞曰吾子欲復文武之略而不正其德將如之何注道也國語叔向云桓子略則行志假貸居賄注犯也如此之類不能盡舉夫字有數義也而執謬若此故知固哉為詩不獨髙叟强作解事實蕃有徒矣假令此書遂行其墮人疑網也豈其微哉莊子齊物云夫道未始有封言未始有常為是而有畛也請言其畛云云此之謂八德注云略而判之有此八德則略字亦大略意也若謂妙得莊㫖是又不識略字矣何自相繆戾也禹穴司馬子長自叙云上會稽探禹穴此子長自言偏逰萬里之目上會稽總吳越也探禹穴言巴蜀也後人不知其解遂以為禹穴在會稽而作地志者以禹廟旁小坎如舂臼者當之噫是有何竒而辱子長之筆耶按蜀之石泉禹生之地謂之禹穴其石杳深人迹不到頃巡撫儀封劉逺夫修蜀志搜訪古碑刻有禹穴二字乃李白所書始知會稽禹穴之誤大抵古人作文言簡而括若禹穴在會稽而上云上㑹稽下又云探禹穴不勝其復矣禹貢曰雲土夢作乂雲在江南夢在江北五言而括千餘里又曰蔡蒙旅平蔡山在雅州蒙山在雲南今名蒙樂山上有碑具列其事亦四字而括千餘里鄭𤣥孔頴達蔡沉夏僎皆所未至而繆云蒙山亦在雅州如此則禹貢所紀山川無乃俗所謂關門閉户掩柴扉乎史自序云遷生龍門耕牧河山之陽年十嵗則誦古文二十而南逰江淮上會稽探禹穴窺九疑浮於沅湘北涉汶泗講業齊魯之都觀孔子之遺風鄉射鄒嶧厄困鄱薛彭城過梁楚以歸於是遷仕為郎中奉使西征巴蜀以南南略卭笮昆明還報命本傳固自明白未浮湘沅輒探蜀穴太史公無乃太濶步乎末又有巴蜀之言更為何地乎異哉載記云符堅欲伐晉謂什道安曰朕將與公謁虞陵於虞領瞻禹穴於會稽泛長江臨滄海不亦樂乎安曰東南區區地下氣癘虞舜遊而不返大禹適而弗歸何足以上勞神駕下困蒼生今云李白所書豈太白在漢晉前耶牛耕困學紀聞論牛耕不始於趙過引冉耕字伯牛是也但未有明證按山海經曰稷之孫曰叔均是始作牛耕王伯厚豈亦未考及此耶紀聞周禮篇云人耦牛耦鄭氏注合耦並言之疏謂周時未有牛耦耕至漢趙過始教民牛耕今考山海經后稷之孫叔均始作牛耕周益公云孔子有犁牛之言冉耕亦字伯牛賈誼書新序載鄒穆公曰百姓飽牛而耕月令季冬出土牛示農耕早晚何待趙過過特教人耦犂費省而功倍爾此紀聞所載也乃以為未考何耶五雲太甲紀聞之說也周官馬政玉海所載也大書特書遂免評駁伯厚幸哉檮杌史記上有檮蓍下有伏龜徐廣云檮音稠左傳八元八凱有檮戭獨孟子檮杌之檮今音濤蓋因陸德明九經釋音而誤也左傳杜預注曰檮杌凶頑無檮匹也以此證之則檮杌亦當音稠索隱曰檮蓍即叢蓍檮古稠字無徐廣音也賈逵曰檮杌凶頑無疇匹之貌謂鯀也云杜注誤左傳注檮戭音稠又音桃檮杌音徒刀反五子之歌左傳引書五子之歌有此冀方今失其行其行今文作厥道按古文衍從行中人又音道石鼓文我水既靜我衍既平五子歌以衍叶方綱當從平音道路之行如景行字作衍人之鴈行足行當作􅀈見龜策傳龜策傳云聖人剖其心壯士斬其胻注胻音衡腳脛也亦非􅀈字胻可直謂之行乎關龍逄太平總類載龍逄諌桀之言曰臣嘗觀君冕非其冕也而冕危石君之屨非其屨也而屨春氷未有冕危石而不壓蹈春氷而不陷者也此為六朝文士擬作無疑羅泌路史收之蓋亦貪博而忘精者路史發揮關龍逄辨云符子曰桀觀炮烙於瑶臺顧龍逄曰樂乎云云逄曰觀君冠危石而履春氷也未有冠危石而不壓履春氷而不陷者桀曰汝知我亡而不自知其亡請就炮烙夫危石春氷言之不倫顧豈逢之語而炮烙之事考之書則紂之行不聞其為桀也云云吾不敢盡信此路史之辨也而公以為收之則公之云云豈亦收之耶彭祖王逸楚辭注彭祖好知滋味善斟雉羮以事帝堯莊子注彭祖八百猶悔不壽恨杖晚而唾逺又曰彭祖餌雲毋御女凡數十娶晚妻鄭氏妖淫敗道而死非壽終也東坡詩空餐雲毋連山盡不見蟠桃結子時莊子逍遙注彭祖至七百歲猶曰悔不壽不云八百也亦無又曰餌雲毋以下云云也神仙傳彭祖善於補導之術服水桂雲毋粉鹿角散常有少容殷末已七百六十七歲而不衰自云喪四十九妻失五十四子殷王使采女傳其術試之有驗乃祕而禁之欲殺彭祖以絶其術祖知乃去不知所之其後七十餘年有人於流沙西見之王不常行彭祖之術得壽三百歲氣力丁壯如五十時得鄭女妖淫王失道而殂此與彭祖何預耶傅說尚書曰說築傅巖之野築之為言居也後世猶有卜築之稱求其說而不得遂謂傅說起于板築雖孟子亦誤矣此蔡傳也據以非孟躗言哉胡蒙溪云說命曰說築傅岩之野孔氏傳云傅氏之巖有澗水瓌道常使胥靡刑人築護此道說賢而隱代胥靡築之以供食至蔡氏不從其說乃云築居也今言所居猶謂之卜築按孔子語子路云傅說負壤土釋板築而立佐天子孟子云傅說舉於板築之間莊子云傅說胥靡墨子云傅說被褐帶索庸築傅巖屈原離騷云說操築於傅巖賈誼鵩賦云傅說胥靡兮乃相武丁班固公孫𢎞贊云板築飯牛之朋崔駰達㫖云役夫發夢于王公張衡應間云委臿築而據文軒夏侯湛扺疑云傅說操築以寤主王子年拾遺記云傅說賃為赭衣舂于深巖以自給沈約恩幸傳論云板築賤役也傅說去為殷相右諸說並同孔傳且孔孟莊墨去殷皆未大逺言必有據不知蔡氏何所見而不從也荀子云鄉也胥靡之人俄而受天下之大器韓非子云傅說轉鬻注云轉次而傭故曰鬻說苑云陳子說梁王曰昔傅說衣褐帶劒而築於秕傅之城武丁夕夢旦得之時王也善說孔融云禰衡罪同胥靡不能發明主之夢帝王世紀云髙宗夢天賜賢人胥靡之衣蒙而來曰我徒也姓傅名說天下得我者豈徒也哉武丁寤而推之曰傅者相也說者歡說也天下豈有傅我而悅民者哉明日以夢視百官百官皆非也乃使百工寫其形象求諸天下果見築者胥靡衣褐帶索執役于虞虢之間傅巖之野名說以其得之傅巖謂之傅說吕氏春秋求人篇云伊尹庖厨之臣也傅說殷之胥靡也皆上相天子至賤也孔子曰傅說負土版築以為大夫遇武丁也韓詩外傳漢郊祀志武丁懼而修德夢得傅說版築以為相漢紀王閎上書諌哀帝云成湯拔伊尹于鼎爼文王招吕尚于渭濵武丁顯傅說于版築桓公舉寧戚于擊角尸子云傅巖在北海之洲地里志傅說版築所隱之處窟名聖人窟伊尹太公竹書紀年伊尹卒于沃丁之世蓋百有五歲太公卒于康王六年壽百有十歲竹書云殷仲壬即位居亳其卿士伊尹仲壬崩伊尹放太甲于桐乃自立也伊尹即位于太甲七年太甲潜出自相殺伊尹乃立其子伊陟伊奮命復其父之田宅而中分之陸機豪士賦序云伊生抱明允以應戮注引竹書帝王世紀伊尹年百歲卒天霧三日沃丁以天子禮葬之不云百有五歲史記太公之卒蓋百有餘年注不引竹書殷商衣郼楊子巵言殷有天下又號曰商詩云商之子孫書云殪戎殷互稱也其並舉則曰咨女殷商又曰殷商之旅中庸云一戎衣一即殪衣即殷也古注釋如此杜子美社稷一戎衣詩人趂韵之語不足據也字又作郼吕氏春秋夏之人民親郼如夏字林玉篇音韋非也噫非傳考籕篆行草及詩書子集曷以知殷商衣郼之異字而同義乎可與汲古者道難為淺中者言也古文許國之許作鄦見于鼎文殷作郼見吕氏春秋說文及林罕楊恆趙古則戴侗諸書皆不收漫書以示好古者上中庸一戎衣鄭云戎兵也衣讀如殷聲之誤也齊人言殷聲如衣康誥曰天乃大命文王殪戎殷誕受厥命孔注殺兵殷疏殪殺也戎兵也左宣六年晉侯欲伐赤狄中行桓子曰使疾其民以盈其貫將可殪也周書曰殪戎殷此類之謂也杜曰義取周武王以兵伐殷盡滅之孔杜解殪為殺鄭注衣讀如殷不云一即殪衣即殷也云古注釋出何典記汲古淺衷談何容易耶吕覽慎大云親郼如夏注郼讀如衣又具備云湯常約于郼薄矣武王嘗窮于畢裎矣以郼薄畢裎並言是非即以郼為殷也又慎勢云湯其無郼武其無岐賢雖十全不能成功又况不及湯武者乎注郼岐湯武之本國玉篇郼讀如衣不音韋說文鄦讀若許在潁川史記鄭悼公元年鄦公惡鄭于楚此亦鼎文耶成湯墓劉向奏議云殷湯無葬處失考也羅泌路史遂傅會其說按楊誠齊揮麈録云殷湯葬􅀢鼎縣今汾州也古尚書注桐宫在湯墓側桐宫今在汾州與􅀢鼎縣之說相合括地志云洛州偃師縣東六里有湯冢近桐宫孔安國云桐宫湯葬地鄭𤣥曰地名有王離宫焉晉太康地記云尸鄉南有亳坂東有城太甲所放處也正義云尸鄉在洛州偃師縣西南五里據此數說桐宫在汾州否耶路史湯冢之辨甚詳語多不載云傅會誤後魏天賜中河東人張恩盜發湯冢得志云我死後二千年困於恩史系寰宇記湯陵在汾隂豈楊所引耶殷紂武王伐紂為天下除暴也紂已死矣又斬以黃鉞而懸之白旗何悖邪賈子言紂死棄玉門之外觀者皆進噈之武王使人帷而守之猶不止也此近于事理矣太史公之輕信汲冢書誤之也墨子曰昔殷王紂貴為天子冨有天下上訶天侮鬼神下殃傲天下萬民武王遂奔入王宫執紂而出繫之赤轘載之白旗以為天下諸侯戮荀子曰昔武王伐有商誅紂斷其首懸之赤斾正論桀死于亭山紂懸于赤斾解蔽尸子曰武王親射惡來之口砟殷紂之頭手汚于血不溫而食當此之時猶猛獸者也以上俱在史記前武王伐紂紂赴火死武王就斬以鉞懸其首于太白之旌齊宣王憐釁鐘之牛睹其色之觳觫也楚莊王赦鄭伯之罪見其肉袒而形暴也君子惡惡不惡其身紂尸赴于火中所見悽慘非特色之觳觫袒之暴形也就斬以鉞懸乎其首何其忍哉論衡晉書束晳傳太康二年汲郡人不准發魏襄王墓或云安釐王冢得竹書數十車大凡七十五篇此汲冢書所由出也乃誤司馬于漢武時耶殷輅論語乘殷之輅其後秦始皇閲三代之車獨取殷制按南史齊志殷有瑞因乘鈎而制車因桑根而為色古所謂器車也一白桑根車一曰金根車南北史俱無志想公見古本耳南齊志云殷有瑞車山車山車垂鈎是也玉輅漢金根也禮緯云山車乘鈎乃鈎車之象昔成湯用而郊祀有山車之瑞山車謂之桑金車似金根之色亦謂之大輅玉門玉門地在成皋戰國䇿武王有玉門之難比文王有羑里之厄其後髙帝滎陽之敗亦獨與滕公逃出成皋玉門此一玉門也聖賢之君兩危矣董卓舉兵犯關脅詔使种卲之於夕陽亭而晉之亂亦由荀朂教賈充夕陽亭餞席之一言此一夕陽亭也而晉漢兩凶渠相襲跡惡地固應爾耶尸子云湯囚於湯丘文王幽於羑里武王羈於玉門越王棲於會稽秦穆敗於殽塞齊桓公遇賊晉文公出走故三王資於辱而五伯得於困也韓非子云文王見詈於玉門顔色不變而武王擒紂於牧野吕氏春秋首時篇云武王不忘玉門之辱高誘注文王歸作玉門武王以此為恥誤竹書紀年云受辛九年作瓊室立玉門紂死其官衛相與糾紂之軀棄之玉門之外賈傅新書高帝紀云項王圍成皋漢王跳獨與滕公共車出成皋玉門徐廣曰北門名玉門漢書張宴注同今云地在成皋與武王同一玉門恐誤靈帝崩何進等謀誅宦官太后不許進私召卓使將兵入朝以脅太后董卓得召即時就道並上書請收讓等太后猶不從卓至澠池而進更狐疑使諫議大夫种卲宣召止之卓不受詔遂前至河南卲迎勞之因譬令還軍卓疑有變使其軍士以兵脅卲卲怒稱詔叱之軍士皆披遂前質責卓卓辭屈乃還軍夕陽亭卲嵩之孫也本書曰還軍今曰脅卲于夕陽亭何耶又卲下增一之字豈其字耶晉書曰氐羌叛帝深以為慮乃從任愷之請以賈充鎮關中充既外出以為失職深銜任愷計無所從將之鎮百僚餞於夕陽亭荀朂私焉充以憂告朂曰公國之宰輔而為一夫所制不亦鄙乎然是行也辭之實難獨有結婚太子不頓駕而自留矣充曰然孰可寄懷對曰朂請行之俄而侍宴論太子婚姻事朂因言充女才質令淑冝配儲宫而楊皇后及荀顗亦並稱之帝納其言會京師大雪平地二尺軍不得發既而皇儲當婚遂不西行詔充居本職夫此座可惜惠帝弗堪負荷縱無賈后劉石詎至虛生耶不審時事而諉之地焉多言哉丹書大戴禮武王踐阼三日召師尚父而問曰黃帝顓頊之道存乎意亦不可得而見與師尚父曰在丹書其言曰敬勝怠者吉怠勝敬者滅義勝欲者從欲勝義者凶注不解丹書為何物按左傳襄公二十三年斐豹𨽻也著於丹書注蓋犯罪沒為官奴以丹書其罪近世魏律緣坐沒配為工樂雜户者皆用赤紙為籍其卷以鉛為軸此亦古人丹書之遺法據此則丹書古人之法律書名也蓋戒人之怠與欲而勉以敬義失敬義則入怠欲而𨽻於刑矣然以法律之書而陳敬義之訓先王以道治天下而不恃乎法其亦異乎鄭書晉鼎乎尚書帝命驗云季秋之月甲子赤爵銜丹書入于酆止于昌户其書云敬勝怠者吉怠勝敬者滅義勝欲者從欲勝義者凶凡事不强則不枉不敬則不正枉者廢滅敬者萬世以仁得之以仁守之其量百世以不仁得之以仁守之其量十世以不仁得之不仁守之不及其世中候再拜稽首受春秋元命包云鳯凰銜丹書于文王之都命云維授金鈐師名吕是類謀云受赤雀丹書注入戊午蔀二十九年云云吕氏春秋云文王見火烏銜丹書集于周舍故色尚赤左傳云初斐豹𨽻也著于丹書欒氏之力臣曰督戎國人懼之斐豹謂范宣子曰茍焚丹書我殺督戎宣子喜曰而殺之所不請于君焚丹書者有如日乃出豹而閉之督戎從之踰隱而待之督戎踰入豹自後擊而殺之據斐豹欲焚其丹書又注謂以丹書其罪似非法律書名周之丹書其可焚乎引之為證亦不類晏子春秋云公游于紀得金壺發而視之中有丹書曰食魚無反勿乘駑馬晏子曰食魚無反毋盡民力乎勿乘駑馬無置不肖者于側乎公曰紀有書何以亡也對曰君子有道垂之閭紀有此言垂之壺不亡何待乎漢書云髙祖定天下封功臣申以丹書之信重以白馬之盟豈皆法律書耶微子四手史記宋世家武王克商微子肉袒面縛左牽羊右把茅亡弟恆讀史至此謂豫曰微子有四手兄知之乎豫曰書傳未聞乃笑曰使無四手何以既面縛而又有左手牽羊右手把茅乎然究言之皆必無之事肉袒面縛出于左氏乃楚人以誑莊王受鄭伯之降借名于武王而誣微子也史言微子抱祭器而入周既入周矣又豈待周師至而後面縛乎又究而言之抱祭器入周亦必無之事劉敞曰古者同姓雖危不去國微子紂庶兄也何入周之有論語曰去之者去紂都也雖去不踰國斯仁矣尚書注疏正義曰啓知紂必亡告父師少師而遁于荒野微子作告是其事也武王既克紂微子乃歸之非去紂即奔周也僖六年左傳云許僖公見楚子面縛銜璧大夫衰絰士輿櫬楚子問諸逢伯對曰昔武王克殷微子啓如是武王親釋其縛受其璧而釋之焚其櫬禮而命之使復其所史記宋世家云武王克殷微子啓乃持其祭器造于軍門肉袒面縛左牽羊右把茅膝行而前以告武王乃釋微子復其位如故是言微子克殷始歸周也馬遷之書辭多錯謬面縳縳手于後故口銜其璧又安得左牽羊右把茅也要言歸周之事是其實耳樂記云武王克殷既下車投殷之後于宋此文自明左僖六年秋楚子圍許以救鄭諸侯救許乃還冬蔡穆侯將許僖侯以見楚子于武城許男面縛云云史記楚成王以兵北伐許許君肉袒謝乃釋之左宣十二年楚子圍鄭入自皇門至于逵路鄭伯肉袒牽羊以迎曰孤不天不能事君孤之罪也史記楚王圍鄭克之鄭襄公肉袒牽羊以迎據此則伐許之楚子乃成王克鄭者莊王也麋鹿蜚鴻史記周紀武王曰維天不享殷自發未生于今六十年夷羊在牧蜚鴻滿野徐廣曰夷羊怪物也蜚鴻蟻蠓也張守節曰夷羊一本作麋鹿喻小人在朝也飛鴻喻君子放棄鄭𤣥曰蜚鴻鴻鴈也知避隂陽寒暑喻民去無道就有道慎按三說皆如眯目而道黑白者詳此文據實事言非喻也紂有鹿臺以養鹿故曰麋鹿在牧蜚鴻馬名若白蟻紫燕之類蓋良馬也養麋鹿而棄良馬故曰麋鹿在牧飛鴻滿野言其養無用而害有用也此說為近史記麋鹿在牧蜚鴻滿野徐廣曰此事出周書及隨巢子云夷羊在牧索隱曰按髙誘曰蜚鴻蠛蠓也言飛蟲蔽田滿野故為災非是鴻鴈也隨巢子作飛拾飛拾蟲也紂紀云厚賦斂以實鹿臺之錢而盈巨橋之粟益收狗馬竒物充仞宫室益廣沙丘苑臺多取野獸飛鳥置其中武紀云武王伐紂紂反走入登於鹿臺之上蒙衣其珠玉自焚於火而死於是命南宫括散鹿臺之財發巨橋之粟觀此則鹿臺非養鹿之所新序云紂為鹿臺七年而成其大三里髙千尺臨望雲雨觀此則非可養鹿處文紀云紂囚西伯閎夭之徒乃求驪戎之文馬有熊九駟因嬖臣費仲而獻之紂乃赦西伯六韜曰商王拘周伯於羑里太公等求得雞斯之乘以獻商王觀此則紂非棄良馬者今謂蜚鴻為馬豈出修文御覽與衝波傳耶又史本作麋鹿在牧正義亦同未嘗云夷羊一本作麋鹿也蜚鴻蠛蠓亦非徐廣之說風伯朝周顔之推賦嵗精仕漢風伯朝周以箕子為風伯謂箕星好風也北齊書文苑傳樊遜孝謙求賢審官對也顔之推與之同傳所著觀我生賦中無此語太公伏符陰謀曰武王伐紂都洛邑陰寒雨雪十餘日深丈餘甲子平旦不知何五大夫乘五車從兩騎止王門外武王曰諸神各有名乎師尚父曰南海神名祝融北海𤣥冥東海勾芒西海蓐收河伯名馮修請使謁者各以其名召之既入王曰何以教之神曰天伐殷立周謹來受命願勑風伯雨師各使奉其職王曰豫嵗時亦無廢禮焉今以箕子為風伯謂箕星好風也畢星好雨則畢公亦可謂雨師耶孔父孔父正色立朝左氏遂謂孔父之妻美而艷蓋因色之一字誣之也左桓公二年宋華父督見孔父之妻於路目逆而送之曰美而艷二年春宋督攻孔氏殺孔父而取其妻已殺孔父而弒殤公史記殤公九年大司馬孔父嘉妻好出道遇太宰華督督說目而觀之督利孔父妻乃使人宣言國中曰殤公即位十年耳而十一戰民苦不堪皆孔父為之我且殺孔父以寧民公羊傳及其大夫孔父書賢也何賢乎孔父孔父可謂義形於色矣其義形於色奈何督將弒殤公孔父生而存則殤公不可得而弒也故於是先攻孔父之家殤公知孔父死巳必死趨而救之皆死焉孔父正色而立於朝則人莫敢過而致難於其君者孔父可謂義形於色矣經無正色字此公羊說耳左氏與孔父又非同時色之一字何所見耶筮龜筮短龜長杜預注曰筮數龜象象長數短此瞽說也孔頴達云神以知來智以藏往是以極妙雖龜之長無以加此以至理而言卜筮實無長短蓋亦知杜之謬而不敢規之今按獻公卜驪姬卜吉而筮凶卜人曰筮之辭所言理短龜之辭所言理長故下文遂引龜辭蓋即立驪姬一事而非謂筮龜有長短也杜之紕謬類多如此左僖公四年初晉獻公欲以驪姬為夫人卜之不吉筮之吉公曰從筮卜人曰筮短龜長不如從長且其􅣟曰專之渝攘公之羭一薰一蕕十年尚且有臭必不可弗聽立之生奚齊注云物生而後有象象而後有滋滋而後有數龜象筮數故象長數短羭美也僖公十五年傳云初晉獻公筮嫁伯姬於秦史蘇占之曰不吉及惠公在秦曰先君若從史蘇之言吾不及此夫韓簡侍曰龜象也筮數也物生而後有象象而後有滋滋而後有數先君之敗德及可數乎史蘇是占勿從何益杜注云言龜以象示筮以數告象數相因而生然後有占占所以知吉凶不能辨吉凶觀此則杜之紕謬不如所云云也葵丘之會孟子載齊桓公五禁曰無曲防無遏糴公羊曰無障穀無貯粟穀梁曰無雍泉無訖糴左傳遏糴作藴年修辭各不同韓文所謂惟古於詞必已出信矣左傳公羊俱不載盟辭左襄公十一年公會晉侯伐鄭同盟於亳載書曰凡我同盟毋藴年毋壅利毋保姦毋留慝或間兹命司慎司盟名山名川羣神羣祀先王先公明神殛之此范宣子辭也乃謂為齊桓之盟何耶葵丘之會在僖公九年相去已九十年矣授玉史記齊世家云頃公朝晉欲尊王晉景公景公不敢當晉世家亦云齊頃公𣣔上尊景公為王景公讓不敢按左傳齊侯朝於晉將授玉司馬遷誤讀玉為王故遂節為此謬說耳孔頴達正義云吾取之史記注止有索隱引王劭云云無孔頴達說也左傳云齊侯朝於晉將授玉注行朝禮郤克趨進曰此行也君為婦人之笑辱也寡君未之敢任班孟堅云司馬據左氏國語采世本戰國策述楚漢春秋作史記左傳時尚未列學宫也司馬當别有據安得謂讀玉為王為謬說也見太常移及史通左文十二年秦伯使西乞術來聘且言將伐晉襄仲辭玉曰君不忘先君之好照臨魯國鎮撫其社稷重之以大器寡君敢辭玉對曰不腆敝器不足辭也成六年鄭伯如齊拜成子游相授玉於東楹之東士貞伯曰鄭伯其死乎自棄也已視流而行速不安其位冝不能久據此則授玉之事固聘問之常也司馬博極羣書豈不知而故改玉為王乎士會當作土會左傳晉有士會士當作為土土為古杜字如詩言桑土而土陶唐氏豕韋氏御龍氏為土氏之宅後於土㑹復晉之下增六字云其處者為劉氏蓋土會本於唐杜氏而劉氏又本於土會也若作士女之士上與唐杜下與劉氏何干涉哉通志略云士氏陶唐之苗裔厯虞夏商周至成王遷之杜為伯宣王殺杜伯其子隰叔奔晉為士師故為士氏隰叔生士蒍字子輿故亦謂之士輿後漢末有交趾太守士燮宋朝有尚書郎士建中左昭二十九年蔡墨對魏獻子曰陶唐氏既衰其後有劉纍擾龍於豢龍氏以事孔甲夏后嘉之賜曰御龍以更豕韋之後左文七年先蔑奔秦士會從之十三年晉人患秦之用士會也乃使魏壽餘僞叛以誘士會秦伯將取魏使士會往既濟魏人譟而還秦人歸其帑其處者為劉氏注士會堯後劉纍之𦙍别族復纍之姓據此則劉氏豈在士氏之後耶謂漢儒增六字則劉纍豈亦增之耶無此六字左氏竟不行耶可笑鶢鶋鶢鶋海鳥今俗名秃􅒗是也出景煥小說國語曰海鳥曰爰居止於魯東門外展禽曰今兹海其有災乎夫廣川之鳥獸常知而避其災是歲海多大風左傳文公二年仲尼曰臧文仲祀爰居三不知也莊子至樂篇云昔者海鳥止于魯郊魯侯御而觴之于廟奏九韶以為樂具太牢以為膳鳥乃眩視憂悲不敢食一臠不敢飲一杯三日而死此以巳養養鳥也注爰居一名雜懸舉頭高八尺樊光注爾雅云形似明皇漢元帝時琅琊有大鳥如馬駒時人謂之爰居詩云有鶖在梁解云秃鶖也貪惡之鳥也使爰居為秃鶖文仲何為祀之魯君何為膳之乎古今注秃鶖一名扶老不云爰居也蜀景煥野人間話云孟昶時有鸚鶋二字疑誤鳴于屋射之不中俗呼秃鶖故老見之曰此鳥主少主歸命咸康時來此時又來當義興替乎皆祕而不奏明年大軍入界咸康王衍年號公之所引或即此也大若爰居爰集于屋者耶蜀時兩至故老習見者耶由湯至於武丁注云由湯至於武丁中間太甲太戊祖乙盤庚慎按尚書無逸稱殷之賢君曰其在太戊其在高宗其在祖甲又總之曰自殷王中宗及高宗及祖甲及我周文王兹四人迪哲以祖甲與中宗高宗並稱而不言太甲則祖甲並美二宗而賢於太甲明矣以祖甲與周文王而並言則其賢益明矣朱子稱殷之賢君獨不及祖甲何哉豫詳考而思司馬遷作史記未見古文尚書乃取國語帝甲亂之一語而衍之曰祖甲淫亂孔安國注尚書遂以祖甲為太甲甚矣安國之愚也不信經而信史不信周公而信司馬遷即使祖甲為太甲無逸之書何以置祖甲於中宗高宗之後言之至再其序皆然周公不如此之顛倒也朱子不稱祖甲者蓋亦信史記及孔安國之過也丹鉛續録孔子世家云安國為今皇帝博士至臨淮太守早卒安國生卭卭生歡史記孔氏有古文尚書孔安國以今文字讀之安國為諌大夫授都尉朝而司馬遷亦從安國問故遷書載堯典禹貢洪範微子金縢諸篇多古文說漢儒林傳夫祖甲之非太甲蔡氏無逸傳辨之詳矣觀史漢則遷史之作在安國後也可云安國未見古文而信司馬乎詩大序哀窈窕文選吕向注云哀蓋字之誤也哀當為衷謂中心思念之也余舊疑哀字之難解見吕說乃豁然矣選六臣注止有李善無吕向也詩序云哀窈窕思賢才而無傷善之心焉鄭氏箋云哀蓋衷字之誤也衷謂中心恕之無傷害之心謂好逑也注疏此本自明乃引選注何耶王肅曰哀窈窕之不得思賢才之良質無傷善之心焉若茍慕其色則善心傷也正義惄如調饑調韓詩作朝薛君章句云朝饑最難忍其義晣矣毛詩作調本屬魯魚鄭氏求其說而不得乃云調音稠又改字作輖調饑也稠饑也輖饑也三者均之不通也愈解而愈離真不若朝饑之為長也焦氏易林云㑂如旦饑晉郭遐周詩言别在斯須惄焉如朝饑漢晋去古未逺當得其實耳毛傳曰惄饑意也調朝也鄭箋云惄思也未見君子之時如朝饑之思食釋文云韓詩作愵如調饑此注疏自明乃謂薛君乂晣出何典記耶復引焦郭謂漢晉去古未逺毛鄭又何代人耶蒸在桑野說文菆麻蒸也故有薪蒸之說薪柴也蒸麻秸也麻秸亦可燒故以薪蒸並言又訓進火氣上行也蒸又訓衆言衆多麻也詩曰天生蒸民是也東山詩蒸在桑野蒸在栗薪或訓為衆或訓為進皆不通當訓為麻軍士從征於外而麻無人收或在桑野或在栗薪此於物理人情最叶千載之疑今日始釋然周公有靈亦當撫掌矣藝林詩云蜎蜎者蠋蒸在桑野有敦瓜苦蒸在栗薪毛傳蒸填也鄭箋古者聲填填塵同也栗薪裂薪也疏云釋詁云塵久也古填填塵皆是田音蒸有三義衆也進也久也此詩言蒸者二以為進則可以言蠋不可以言瓜以為衆則喻獨宿不取衆義也此詩皆言久役之情則久義為勝詩緝集傳云蒸發語辭讀詩記分行書之夫豳風七月陳王業之艱難其詩固云禾麻菽麥矣乃云蒸當訓為麻云云謂其叶于情理釋疑千載嗚呼后稷教民稼穡豈專教豳民種麻耶且軍士在外麻無人收矣其在桑野者誰種之在栗薪者誰置之耶周公有靈故知果爾當撫掌矣天夭是㧻張衡應間云利端始萌害漸亦牙䔩䔩方榖夭夭亦加欲豐其屋乃蔀其家據此則以天夭為夭夭也衡去古未逺疑得其真且佌佌䔩䔩夭夭連文為是不應速速下又特出天夭也夭夭之說近之此蔡雍釋誨語也以為應間誤易逆數安公石作易牖此解極為超邁自唐宋諸儒未有是說也朱子嘗有一半逆一半順之疑矣而終未能自決之也公石之說曰天下之事數往者順知來者逆易為知來而作故其數逆數也數往者順蓋因下句而並舉之非為易有數往之順數也公石於經妙契超詣有如此趙子崇為豫言此惜未見其全也韓康伯曰作易以逆覩來事以前民用注孔頴達曰易之為用人欲數知既往之事者易則順後而知之人欲數知將來之事者易則逆前而數之是故聖人用此易道以逆數知來事也易雖備知來往之事莫不假象知之故聖人作易以逆覩來事也正義張敬夫曰易之於天下皆逆數而察其來故易逆數也逆如逆暑逆寒預為之主者也易說邱富國曰易言藏往知來彰往察來又言數往知來則方來已往之事易皆有以知之然往者已過而易知來者未形而難見易之占筮為知來設故曰易逆數也正如所謂占事知來所謂遂知來物所謂前民用皆逆數之謂也易全解李簡曰數往者順謂數已往之事則順而易知也知來者逆謂預度未來之事則逆而難知也易之道無它其於未來之事可逆睹而前知也故曰易逆數也學易記康伯晉人頴達唐人俱載注疏可云唐宋以來無是說耶公本經也豈於諸家注解略不㸃目耶故知面皮之云蓋亦當時之定價者矣陰符經陰符經非黃帝書蓋出後漢末唐人文章引用者惟吳武陵上韓舍人行軍書有禽獸之制在氣一語梁肅受命寶賦有天人合發區宇樂推一語馮用之機論權論兩引之此外絶無及之者李筌郎中為荆南節度判官集閫外春秋十卷既成自鄙之曰常文也乃注黃帝陰符經兼成大義至禽獸之制在氣經年懵然不解忽夢烏衣人引理而教之其書遂行於世僉謂鬼谷留侯復生也筌後為鄧州刺史常夜占星宿忽見東南異氣明旦呼吏於郊市搜訪之於村落得牧羊胡婦一子李君慘容曰此假天子也乃安祿山生於南陽雲溪友議李筌號達觀子好神仙之道常厯名山博採方術至嵩山虎口巖石室中得黃帝陰符本絹素書緘之甚密題云大魏真君二年七月七日道士冦謙之藏之名山用傳同好其本麋爛筌抄讀數千遍竟不曉其義因入秦至驪山下逢一老母神狀甚異路傍見遺火燒樹因自語曰火生于木禍發必克筌聞之問曰此黃帝陰符祕文母何得而言之母曰吾受此符已三元六周甲子矣少年從何而知筌具告其故母命坐為說陰符之義曰非竒人不可妄傳復曰吾有麥飯相與為食袖中出瓠令筌谷中取水水既滿矣瓠忽重百餘斤力不能制而沉泉中及還已失老母但留麥飯數升於石上而已筌有將略作太白陰符十卷有相業著中台志十卷時為李林甫所排位不顯竟入名山訪道不知所終神仙感遇傳集仙傳陸龜蒙讀陰符經詩清晨整冠坐朗詠三百言備識天地意獻詞犯乾坤口銜造化斧鑿破機關門五賊忽迸逸萬物爭崩奔虛施神仙要莫救華池源曽亦愛兩句可與賢達論生者死之根死者生之根方寸了十字萬化皆胚渾皮日休讀陰符經詩三百八十言出自伊祁氏上以生神仙次云立仁義𤣥機一以發五賊紛然起結為日月精融作天地髓不測似陰陽難名若神鬼得之升高天失之沈厚地具茨雲木老大塊煙霞委自顓頊以降賊為聖人軌如何黃帝機吾得多坎躓歐陽詢藝文木部引陰符火生二句以上三書及二詩皆唐人也乃云此外絶無及之者談何容易耶其區宇樂推亦非陰符中語朝氏讀書志云陰符經唐少室山人布衣李筌注按驪山姥傳筌仕為荆南節度副使鄧州刺史與雲溪友議俱同乃云布衣何耶王蜀軍校黃承真受黃帝陰符於鄭山古與今陰符不同凡五六千言一畫一㸃皆以五行屬配通暢亹亹實祕緯也孫光憲于黃處見之北夢瑣言王元美云陰符是秦漢人贋作李筌為之釋仍託辭于驪山老姥以神其說楊用修遂謂為筌作非也筌開元時人永徽中禇遂良嘗奉㫖寫一百卷李筌僞陰符劉歆僞周禮猶能文其詞夫既駁楊矣復云筌之僞書何自矛盾耶焚書起于韓非秦焚書坑儒起于李斯乎斯之先固有為此說於秦者矣韓非是也非之言曰世之愚學皆不知治亂之情囁䛟多誦先古之書以亂當世之治闕又妄非有術之士聽其言者危用其計者亂又言舍法律而言先王者上任之以國主以是過豫而臣以此徒取矣此與斯所言是古非今若合符節作俑者乃韓非匪斯也宋儒有過丈者乃謂斯之學出於荀卿焚坑之禍卿有以啓之卿嘗入秦見應侯譏秦之無士矣舍非而罪卿所謂洗垢而索瘢者耶商君教秦孝公以連什伍設坐之過燔詩書而明法令塞私門之請而遂公家之勞禁游惰之民而顯耕戰之士孝公行之主以尊安國以富强韓和氏夫詩書之燔韓子明謂商鞅矣乃摘韓語追咎之洗垢索瘢其亦自道也與魯禘禮記明堂位曰成王以周公有勳勞於天下命魯公世祀周公以天子禮樂漢儒魯頌閟宫傳遂緣此以解皇皇上帝皇祖后稷之文宋儒程子曰周公之功固大矣然皆臣子之分所當為魯安得獨用天子之禮樂哉成王之賜伯禽之受皆非也其論正矣其事則未之詳考也魯用天子禮樂魯之末世失禮也非始于成王伯禽明堂位之作周末陋儒之失辭也不可以誣成王伯禽自漢儒傅會之太過宋儒考究之不精使成王伯禽受誣於千載之下寃矣哉昔成王命君陳拳拳以遵周公之猷訓為言猷訓之大無大於上下之分豈其命伯禽而首廢之哉按吕氏春秋魯惠公請郊廟之禮於周天子使史角往報之所謂天子蓋平王也使成王果賜伯禽則惠公又何復請之有其曰天子使史角往報之蓋亦未之許也平王猶不之許而謂成王賜之乎且襄王之世衰亦極矣猶不許晉文公之請隧而謂成王不如襄王乎且伯禽之賢雖不及周公然賢於晉文公逺矣豈肯受之哉禮又曰成王康王賜魯重祭成王既賜康王又何加焉此蓋不能自掩其僞矣然則魯之僣禮何始也曰著在春秋與魯頌春秋桓公五年書大雩雩之僣始于桓也閔二年書曰禘于莊公禘之僣始于閔也僖三十一年書曰四卜郊郊之僣始于僖也魯頌閟宫三章首言乃命魯公俾侯于東錫之山川土田附庸無異典也其下乃言周公之孫莊公之子以及于享祀不忒皇皇后帝皇祖后稷蓋魯自伯禽而下十有八世自僖公始有郊祀而詩人頌之則其不出於成王之賜益明矣故論語載孔子之言曰禘自既灌而往者吾不欲觀之矣禮記載孔子之言曰杞之郊也祀禹也宋之郊也祀湯也魯之郊禘非禮也當時魯之僣禮不惟聖人非之天下有識者蓋亦非之魯之君臣恐天下議巳乃借名於成王伯禽以掩天下之口魯之陋儒諂佞遂作明堂位以文其過甚矣其無忌憚也孰甚焉魯頌曰白牡騂剛白牡周公之牲也周公既用天子禮樂胡為而白其牲乎白者殷之色也宋之郊用之冝也魯人用之不冝也既不冝矣用之何義噫我知之矣魯之君臣見宋之郊必私相謂曰宋無功于周而且郊可以魯而不郊乎于是效宋之郊亦白其牲使後世有王者起以僣分討魯則以宋為解若其果受成王之賜則遂用周之赤色矣元儒許白雲亦嘗考魯郊廟之事不出成王之賜然以程朱嘗引言之終不敢議是敢于非周公孔子而不敢于非宋人也學者膏肓之病也哉按此特增衍春秋意林及周尚書洪謨說耳移宫就商非崔論也意林周說語多不載詳掇本事一為正之左襄十年宋公享晉侯於楚丘請以桑林桑林殷天子樂名荀偃士丐曰諸侯宋魯於是觀禮宋王者後魯以周公故皆用天子禮樂故可觀魯有禘樂賔祭用之禘三年大祭則作四代之禮樂宋以桑林享君不亦可乎此晉人語豈亦魯之陋儒耶襄二十九年吳公子札來聘請觀于周樂使工為之歌周南召南云云舞象簫南籥文樂大武武樂韶濩湯樂大夏禹樂至舞韶簫舜樂曰德至矣觀止矣若有他樂吾不敢請巳魯用四代之樂故及韶簫而季子知其終也文公四年衛寧武子來聘公與之宴為之賦湛露及彤弓不辭又不答賦使行人私焉對曰臣以為肄業及之也昔諸侯朝正於王王宴樂之於是乎賦湛露則天子當陽諸侯用命也諸侯敵王所愾而獻其功王於是乎賜之彤弓一彤矢百玈弓矢千以覺報宴今陪臣來繼舊好君辱貺之其敢干大禮以自取戾夫季子來聘聞樂知德寧武聆賦不辭不答故知天子禮樂魯之用也舊矣不然季子安得請觀武子謂之肄業耶染不可不慎也孔子學于老聃孟蘇䕫靖叔魯惠公使宰讓請郊廟之禮於天子桓王使史角往惠公止留之其後在于魯墨子學焉舉天下之榮顯必稱此二士者孔墨之後學業顯榮于天下者不可勝數皆所染者得當也吕覽當染春秋平王四十九年隱公元年也隱三年平王崩桓王即位吕云惠公請郊廟之禮桓王使史角往則在隱前豈桓為太子事耶世逺言湮其將何以取證乎劉恕外紀云初魯惠公使宰讓請郊廟之禮于天子王使史角往魯公止之路史云劉原父謂使魯郊者在周而必非成王蓋平王以下固亦未之悉耳始魯惠公使宰讓請郊廟之禮于天子天子使史角往止之其後在魯於是有墨翟之學魯之用郊正亦始于此矣夫惠公之止之則是周不與之矣不與而魯用郊自用之也惠公之請由平王世也金履祥通鑑前編云平王四十八年魯初請郊廟之禮用外紀路史修按二書所引皆吕覽事也劉恕王上去桓字羅泌以天子易桓王字不過欲附會其事遷就已說耳然吕覽固在也金氏因而載之何耶且惠公止之是留史角耳故墨翟學焉羅云天子使史角往止之則是周不與之于當染合耶楊引吕覽云天子使史角往報之所謂天子蓋平王也其曰使往報之蓋亦未之許也改易桓字又添報字豈亦前人故知耶祭統曰昔者周公旦有勳勞於天下周公既沒成王康王追念周公之所以勳勞者而欲尊魯故賜之以重祭外祭則郊社是也內祭則大嘗禘是也夫大嘗禘歌升清廟下而管象朱干玉戚以舞大武八佾以舞大夏此天子之樂也康周公故以賜魯也子孫纂之至於今不廢所以明周公之德而又以重其國也夫俾侯於魯頌謂分封之典賜魯重祭記言追念其勳固各紀事之辭也執此例彼以意逆志者耶且成康賜魯此載甚明乃云不能自掩其僞夫禮記非一人作也豈記祭統者為作明堂位者掩之耶隱公五年初獻六羽公羊曰初者何始也左氏曰始用六佾也穀梁曰始僣樂也文公十五年初履畝注哀公曰二吾猶不足遂以為常故曰初此經例也大雩禘郊俱不云初詎可謂始于某公耶且大雩後書螽亦可云螽始於桓耶尸子曰舞夏自天子諸侯皆獻八佾初獻六羽始厲樂矣家語禮運言偃曰今之在位莫知由禮何也孔子曰夫魯之郊及禘皆非禮周公其已衰矣杞之郊也禹宋之郊也契是天子之事守也天子以杞宋二王之後周公攝政致太平而與天子同是禮也禮記無天子以杞宋後三句揚以契作湯誤張湯問曰魯祀周公用白牡非禮也周天子用騂犅羣公不毛周公諸公也何以得用純牲董仲舒曰成王幼在襁褓周公繼文武之業成二聖之功故賢而貴之使祭以白牡上不得與天子同色下有異於諸侯報德之禮也湯曰天子祭天諸侯祭土魯何緣以郊祭曰周公傅成王成王遂及于聖功莫大于此周公聖人也有祭于天道成王令魯郊也湯曰魯祭周公用白牡其郊何用曰魯郊用純騂犅周色尚赤魯以天子命郊故以騂仲舒郊祀對周公稱太廟魯公稱世室周公用白牡魯公用騂犅公羊文十三制曰周公祭天命社故魯有白牡騂剛之牲羣公不已賢不肖差也史武三王世家明堂位曰季夏以禘禮祀周公牲用白牡郊特牲曰由夷王以下諸侯之宫懸而祭以白牡諸侯之僣禮也故天子微諸侯僣夫周公白牲詩禮春秋俱同而效宋為解無乃費詞耶且記于夷王以下之僣未始假借也獨明堂位乃為佞耶雜記孟獻子曰正月日至可以有事于上帝七月日至可以有事于祖七月而禘獻子為之也此又魯郊禘之一證也克段于塢石經春秋鄭伯克段于塢塢鄭地也在緱氏縣西南左氏云王取塢劉蒍邗之田于鄭是也杜預潁川鄢陵謬矣鄢陵非鄭地段焉得有兵衆乎郭知𤣥切韻云帝虎竝訛烏焉互舛正指此條成十六年左傳云鄭叛晉晉侯將伐鄭鄭人使告於楚楚子救鄭六月晉楚遇于鄢陵郤至曰鄭陳而不整蠻軍而不陳我必克之國語曰晉伐鄭荆救之欒武子與荆人戰于鄢陵大勝之韋昭曰鄢陵鄭地杜預繆矣韋注國語因賈君之精實採唐虞之信善去非要存事實以鄢陵為鄭地豈亦謬乎傳云京叛太叔段入于鄢公伐諸鄢史記段出走鄢鄢潰段出奔共未嘗言有兵衆而用之也夫東都石經久已無存今所行長安石經正作鄢字公引石經豈别本耶史記段出走鄢正義曰塢音烏古反今新鄭縣南塢頭有村多萬家舊作鄢音偃杜預云鄢今鄢陵也公欲用塢字引此猶為有據乃引石經耶郭知𤣥切韻烏焉互舛云云寡陋未能見之然公古音略目載知𤣥集韻拾遺不云切韻豈亦引石經意耶冶容冶字從仌冶者銷金鐵也遇熱則銷遇冷則凝與氷同志故其意從氷易曰冶容誨淫艷色美容能令人精神銷融故曰冶容干寶易注云爾巵言冶銷也遇熱則銷遇冷則合與氷同志故冶字從氷女之艷媚能令人銷神流志故美色曰冶也三蒼蠱與冶通易曰冶容誨淫古韻陸德明經典什文云冶音也鄭陸虞姚王肅作野言妖野容議教誨淫泆也陸備引衆解不及干注不知公於何書得之三蒼止有冶銷也遭熱云云從氷五句魏書江式曰李斯作蒼頡篇揚雄作訓纂篇後漢郎中賈魴作滂喜篇故曰三蒼冶容解一也一云干注一云三蒼將戌係亥豈皆自謂影撰者耶蠱冶字詳三卷冶渚條下勞薪王劭奏改火疏昔晉師曠食飯云是勞薪所炊晉平公使視之厨果然車輞今傳以為苻朗事非也巵言世說云荀朂嘗在晉武帝坐上食荀進飯謂在坐人曰此是勞薪炊也坐者未之信密遣問之實用故車腳正楊卷一
