body:
  text: 正楊卷三明陳耀文撰雲岳屛風漢鄭𢎞第五倫故吏同為太尉司空每朝見𢎞曲肱自卑明帝聞知乃賜雲岳屛風分隔其間雲岳即雲氣山岳也謝承後漢書鄭𢎞為太尉時舉第五倫為司空班次在下每正朔朝見𢎞曲躬自卑上問知其故遂聽置雲母屛風分隔其間由此為故事此謂雲岳復為之註何也梁劉孝威啓昔紀亮所隔惟珍雲母陳𢎞周正啓昔琉璃見重雲母彌珍趙李阮籍詠懐詩西逰咸陽市趙李相經過顔延年以為趙飛燕李夫人劉㑹孟謂安知非實有此人不必求其誰何也不詳詩意咸陽趙李謂游俠近幸之儔漢書谷永傳小臣趙李從㣲賤尊寵成帝常與㣲行者籍用趙李字正出此若如顔延年說趙飛燕李夫人豈可言經過如劉㑹孟言當時實有此人唐王維詩亦有日夜經過趙李家豈唐時亦實有此人乎乃知讀書不詳考深思雖如延年之博學會孟之精鍳亦不免失之况下此者耶詩話補遺云阮籍詩西㳺云云經過顔延年注趙飛燕李夫人非也按漢書乃成帝時趙季李欵延之之􅀶尚有此誤馮少洲詩紀並載谷永傳成帝乆無繼嗣數為㣲行多近幸小臣趙李從㣲賤專寵皆皇太后與諸舅夙夜所常憂至親難數言故推永等因天變切諫永䟽云掖庭獄大為亂阱滅絶人命主為趙李報怨班倢伃傳自鴻嘉後上稍隆扵内寵倢伃進侍者李平平得幸立為倢伃上曰始衛皇后亦從㣲起迺賜平姓曰衛其後趙飛燕姊弟亦從自㣲賤興踰越禮制寖盛扵前敘傳成帝自大將軍王鳯薨後富平定陵侯張放淳于長等始愛幸出為㣲行行則同輿執轡入侍禁中設宴飲之會及趙李諸侍中皆引滿舉白談笑大噱㨿此則子所引者正趙飛燕也且小臣趙李句讀俱差何用笑延之乎何並傳並自隴西太守徙潁川太守陽翟輕俠趙季李欵多畜賓客以氣力漁食閭里至姦人婦女持吏長短從横郡中聞並至皆亡去並下車敕曰趙李桀惡雖逺去當得其頭以謝百姓吏後得趙李他郡持頭還並縣之謝靈運景隆法師誄云生自豪華家贏金帛加以巧乗騎解絲竹詠絶響於康衢弄絃管扵華肆者非徒經旬涉朔彌厯年稔而已諒趙李之咸陽程鄭之臨卭矣又云生以意泰意管生理孰是歡慰程鄭趙李據此趙李與程鄭並言則非陽翟可殺之趙李也王元美云嵇叔夜詩西㳺云云經過注謂李夫人趙飛燕大誤或云趙飛燕李平皆成帝所幸婕妤然不應與婕妤㳺從班史谷永傳又為趙李報徳復怨注小臣趙李從㣲賤尊寵楊用修又言即趙季李欵然二人皆陽翟大俠為何並所殺未審孰是玉樹左思三都賦序譏揚雄賦甘泉不當言玉樹青葱誤矣揚雄言玉樹者武帝所作集衆寳為之以娛神非謂自然生之猶下句言馬犀金人也漢武帝故事曰上起神屋前庭殖玉樹珊瑚為枝碧玉為葉璧馬犀言作馬及犀為璧飾也此已見選注似無煩贅辭為也王褒雲陽宫記云甘泉宫北有槐樹今為玉槐樹根幹盤峙三二百年木也耆舊相傳咸以此樹即揚雄甘泉賦所謂玉樹青葱者也三輔黄圖亦載國史纂異云雲陽縣界多漢離宫故地有似槐而葉細玉人謂之玉樹揚子甘泉賦云玉樹青葱后左思以雄為假珎恠盖未詳也隋唐嘉詁長安記亦載月窟日域揚子雲長楊賦西壓月􅙡古窟字東震日域服䖍注以為月所生恐非李太白詩天馬來出月氏窟月窟即指月氏之國日域指日逐單于也盖借日月字以形容威服四夷之逺耳太白妙得其解矣月氐一作氏又作月支唐人僑置覉縻曰氐州氏音支樂府有氐州第一氐州第二即此地也併附著之顔延年詩月竁來賓日際奉土注竁窟也陶𢎞景水仙賦東卷長桑日窟西幹龍築月阿南齊禮志月域來賓日際奉土隋樂志北齊皇夏詞月軌咸梯岫日域盡浮川唐祭神樂章云包含日域牢籠月竁昭明大法頌西踰月窟東漸扶桑據此則月窟自明李白天馬歌天馬来出月氏窟背為虎文龍翼骨非用此月窟也又云日逐單于單于豈居東方耶王僧孺與何遜書腦日逐髓月氏金虎甘石星經云昴西方白虎之宿太白金之精太白入大昴金虎相薄主有兵亂文選張平子賦始於宫隣卒扵金虎注不知引此而謬自為說薛綜曰金虎西方白虎神王金金白也善曰應劭漢官儀曰不制之臣相與比周比周者宫隣金虎宫隣金虎言小人在位比周相進與君為隣貪求之徳堅若金䜛謗之言惡如虎也觀註薛已註在前矣豈善不知而謬自為説耶李業傳引語彀弩射市薄命先死後獨行傳王莽命劉咸強召李業業乃載病詣門咸怒出教曰賢者不避害譬如彀弩射市薄命者先死聞業名稱故欲與之為治而反託疾乎此云引語誤古諺古語載籍通引龍不隠鱗鳯不藏羽網羅髙懸去將安所後逸民傳陳留老父見張升與友人班草而言相抱而泣趨而過之植杖太息言曰二丈夫何泣之悲也夫龍不隠鱗云云安所雖泣何及乎未嘗云諺及古語也天禄渴馬秇林伐山漢靈帝脩南宫鑄天禄蝦蟆轉水入宫又作翻車渴烏灑路天禄即大蝦蟆伯樂之子按圖索駿以蝦蟆為馬即天禄也天禄之形漢人多刻石肖之於墓古詩所謂天禄辟邪眠莓苔也又云一角為天禄兩角為辟邪二說互異何也瑞應圖曰天䴪者純靈之獸五色光耀洞明王者道備則至漢書靈帝紀鑄黄鍾四天禄蝦蟆注天禄獸也今南陽縣有宗資墓旁有兩石獸其髙八尺角而麟分鼠曳尾過壯大左曰天禄右曰辟邪字皆刻膊上漢有天禄閣亦因此獸立名伯樂子執馬經畫様求馬盖尹神童戱語也見朝野僉載乃即謂蝦蟆為天禄何㢤管輅𢎞明集知察舞鷄爻分封蟻下句管輅事梁湘東王簡文帝法寳聨璧序云我儲君業邁宣尼道髙啓筮之作聲超姬發寧假卞蘭之頌知察云云異苑云魏武時南方獻山鷄操欲其鳴舞而無由公子倉舒取大鏡着其前鷄見形而舞不止遂乏死東觀記云沛獻王輔善京氏易永平五年少雨上以易林占之繇曰蟻封穴居大雨將至以問輔曰蹇艮下坎上山出雲為雨蟻穴居知雨此正引二王事曰管輅事誤劉表善書董北苑云劉景升為書家祖師鍾繇胡昭皆受其學然昭肥繇瘦各得其一體景升即劉表也表初在黨人中俊厨顧及之列其人品之髙可知藝文志有劉表集今雖不可見觀三國志注載其與袁尚兄弟書其筆力豈減崔蔡耶則翰札之工又其餘事耳書斷云劉徳升字君嗣潁川人桓靈之世以造行書擅名既以草剏亦甚妍美風流婉約獨步當時胡昭鍾繇並師其法世謂鍾繇善行押書是也而胡書體肥鍾書體瘦亦各有君嗣之美也今以徳升為景升大誤表二書見王粲集後書注甄字音說文甄陶也从瓦垔居延反呉書孫堅入洛屯軍城南甄宫井上旦有五色氣人入井探得傳國璽以甄與已名音叶以為受命之符則三國以前未有音為之人切者也孫權即位尊堅為帝江左諸儒為吳諱故改音真後秦諱苻堅隋諱楊堅皆暫避其音全文見莊季裕鷄肋編盖甄履舊譜妄說耳吳書曰堅入洛掃除漢宗廟祠以太牢堅軍城南甄宫井上旦有五色氣舉軍驚恠莫有敢汲堅令人入井探得漢傳國璽初黄門張讓等作亂劫天子出奔左右分散掌璽者以投井中袁術有僣逆之謀聞孫堅得𫝊國璽遂拘堅妻奪之後書既見奪矣可云甄與名叶為受命符耶裴松之云孫堅扵興義之中最有忠烈之稱若得漢神器而潜匿不言此所謂隂懐異志豈所謂忠臣者也吳史欲以為國華而不知損堅之令徳如其果然孫皓降晉何得寳藏之而獨送六璽耶張華女史箴云散氣流形既陶既甄在帝庖犧肇經天人茂先晉人與吳同時豈亦為吳諱耶范書光武賛光武誕命靈貺自甄沉幾先物深略緯文蔚宗豈秦人耶又豈預為隋文諱耶㑹昌一品集武宗真容賛爰命彩繢載模天真聖作物覩禎祥以臻宣光孕靈虞熈載甄徳裕又誰諱耶孫奕示兒編甄有二音學者皆押先字韻及真韻反未嘗押此皆相承之乆信耳不信目之過也按唐何超晉書音義云洛書甄曜度裴秀甄擿舊文山濤甄拔人物及左甄右甄字音堅甄衛之家甄徳遣婦生来哭人并州將田甄姓名字音真是甄字二音之辯也在前人皆互用之乃專據堅音誤其甄陣之音以何令升為楊正衡又誤水性水性不同予扵續錄詳之矣近閱太平廣記諸葛孔明時有蒲元者術鍳同歐冶風胡常為孔明鑄刀劍言蜀惟江水爽烈是天分其野大金之元精也漢水鈍弱及涪水皆不任淬刀劍或以涪水雜江水元輒能辯之管子論齊之水云其泉白清其人堅勁寡有疥瘙終無痛醒今之濟川伏流至東阿井以煮膠和半夏丸皆異常藥水性之分信有之矣蒲元别傳見太平御覽刀劒部中廣記不載豈閣本耶水性不同如悉唐制角畔怯腐手云云俱剽路史説也别論乃譏其貪慱而忘精焉惡知非有盜憎主人抑何甚㢤鍾繇魏書鍾繇傳明堂所以祀上帝靈臺所以觀天文辟雍所以脩禮樂太學所以集儒林髙禖所以祈休祥既稱太學又稱辟雍可證辟雍非太學也明矣魏名臣奏王朗節省奏曰夫天地則掃地而祭其餘則皆壇而埒之矣明堂云云又所以察時務揚教化此見魏志朗傳注魏自有書魏志非魏書也云鍾繇傳誤倉舒曹操幼子倉舒死求邴原死女合𦵏史以為譏余觀周禮地官禁嫁殤者注謂生時非夫婦死而葬相從嫁殤嫁死人則此俗古巳有之今民間猶有行焉而無禁也魏志云沖亡後操哀甚言則流涕為聘甄氏亡女與合葬原傳云女早亡時倉舒亦没操欲求合葬原辭曰合葬非禮也原之所以自容於明公明公之所以待原者以能守訓典而不易也若聴明公之命則是凡庸也明公焉以為哉操遂止史前後俱無譏辭其所合葬亦不止求原女也周禮媒氏禁遷葬與嫁殤者引注亦誤莊􅠤􅠤从九从酋王仲宣從軍詩館宇充廛里士女滿莊􅠤自非聖賢國誰能享茲休􅠤音求九交之道也字從九從酋為是又說文馗音逵从九从首九達道也似龜背故曰馗从九首一道為一首與馗同義而異音馗从首􅠤从酋今人不識􅠤字皆从首誤矣此見王粲集古本最可證今本多作馗非也善註曰韓詩曰肅肅兔罝施於中逵爾雅云六逵謂莊薛君曰馗九交之道也五臣作􅠤音仇良曰鄽莊皆道也選注自明曰古本何耶韻㑹支尤二韻通作馗探情以華選王仲宣詩探情以華覩㣲知著本史記律書情核其華道著明矣之語華者貌也然史記之語觀仲宣之詩而益明仲宣之詩得李善之解而始白觀書所以貴乎博證也史記律書云雖妙必効情核其華道著明矣正義曰妙謂㣲妙之性也効猶見也核研核也華道神妙之道也言人雖有㣲妙之性必須程督巳之情理然後研核神妙之道乃能究其形體辨其成聲故謂明矣觀注情屬効讀道屬華讀若情核其華為句則不通矣者明亦不云著明矣仲宣贈文叔良詩既慎爾主亦迪知幾探情以華覩著知㣲不云覩㣲知著也注云華喻貌亦不云華者貌也吐金鳥酉陽雜爼云魏明帝時昆明國貢辟寒鳥常吐金屑如粟昆明今為雲南服裡之縣不聞此鳥其逺至夷徼亦不聞也段式之好張虛大之言其著酉陽雜爼亦似郭子横洞㝠記唐人杜陽雜編全構虛誑殊無一實也或者逺夷多詐以金屑飼鳥以欺侮中國如秦蜀金牛云是乎𠻳金鳥吐金屑名避寒金見拾遺記非段柯古好張虛大也今曰吐金鳥避寒鳥似亦欠審柯古名成式曰式之又誤碧桐杯秇林伐山唐人碧桐杯詩酒味雜蓮氣香冷勝扵氷輪囷如象鼻瀟灑絶青繩酉陽雜爼云厯城北有使君林魏正始中鄭公殻三伏之際每率賓僚避暑扵此取大蓮置硯格上盛酒二升以簮刺葉令與柄通屈莖上輪囷如象鼻狀噏之名為碧筩杯歴下學之言酒味雜蓮氣香冷勝於冰此復引用之而不著所出何耶筩作桐亦誤侍中執虎子蘇則與吉茂同隱于太白山則為侍中侍中親省起居故謂之執虎子茂見則曰仕進不止執虎子則笑曰誠不能效汝蹇蹇鹿車驅按漢世有諺語云仕宦不止車生耳謂重較也吉茂反語以戱蘇則謂不得坐車較車而反執虎子也則亦為韻語以荅茂驅叶音上聲與汝為韻云魏畧舊儀侍中親省起居故俗謂之執虎子始則同郡吉茂者是時仕甫厯縣令遷為冗散見則嘲之曰仕進不止執虎子則笑曰我誠不能效汝蹇蹇驅鹿車馳也魏志則先賜爵關内侯進封都亭侯徵拜侍中夫則為侍中茂為冗散可戱則無車耶則語自明乃云韻語故耶誤耶抑未見原本耶晉書云孝武為清暑殿有識者以為清暑反為楚聲哀楚之徵也宋書明帝多忌諱袁粲初名愍孫反語袁愍為殞門帝意惡之乃令改焉南史齊文惠太子立樓舘鍾山下號東田東田反語顛童也武帝于清溪立宫號舊宫反之窮廐也右反語見史籍者不能盡載茂語可反重較耶王元美云虎子䙝器也以虎子對鹿車意非謂重較反語也晦伯辨之更不明余正用脩誤云反語耳元美謂其不明豈亦未見諸史反語耶灰釘李商隱露布飛走之期既絶灰釘之望斯窮宋人小説謂杜篤論都賦燔康居灰珍竒椎鳴鏑釘鹿蠡近何子元餘冬録中證其非謂是曹爽在獄中乞棺釘與灰扵司馬懿事其事本不僻也余又考梁書徐勉疏云屬纊才畢灰釘已具陳覇先九錫文袄酋震慴遽請灰釘以二條證之尤足破宋人之謬説灰釘事楊用修引餘冬論證其非謂曹爽求司馬懿事其事本不僻云云按王凌既降未測懿意故乞棺釘與之乃仰藥死曹爽幽處第中糧盡告急扵懿懿給肉米糗􅀈且以書慰之大喜過望未幾獄具夷三族今以灰釘事歸曹爽抑何舛也王元美餘冬録辨談苑云魏畧王凌試索棺釘以觀太傅意太傅給之凌遂自殺陳本紀乃此事故有請之云而商隠亦有望窮之云其以棺為灰灰與釘皆闔棺之具商隠承用之正凌事耳若用杜篤賦所云者何以請以望為㢤此說自明楊誤以為爽耳乃謂其舛何耶隋安徳王雄慶舍利感應表云釋提請灰之後育王建塔以來廣𢎞明集請灰豈用釋提事耶賜丞相顧雍書吳大帝貴孫子直令問休休至扵相見過扵所聞為君嘉之顧承字子直邵之子雍孫也嘉禾中與舅陸瑁俱以禮徵權賜雍書云此吳志全文正尺牘佳語也通志畧不載而用脩遺焉豈未見耶答魏舒書晉武帝可散愁養氣更増滋味仍給陽燧四望牕户車庶出入觀望或足散憂也魏舒年老致仕子混卒詔曰舒惟一子薄命短折舒告老之年處窮獨之苦毎念怛然為之嗟悼思所以散愁養氣可更増滋味仍給賜陽燧四望繐牕户皂輪牛車一乗庶出入觀望或足散憂也此詔也而曰答書且截去前半復去思所以及可字賜字遂使文義艱澁尺牘耶與天公牋晉劉謐之體戰身噤脫衣凍坐頼公借袍南岳送火牋云昔辛酉之際遭湯旱流煙今子亥之嵗值堯水滔天火延其廬水壊其國何人小子頓偷雙船由是行無擔石室如懸磬云云獨此四句可録耶與王導書王敦温太真别來幾日作如此事當募人生致之自拔其舌此通鑑晉明帝紀語也綱目及胡三省註不證其誤而公復以為尺牘又誤矣晉書温嶠傳云王敦表温嶠為丹陽尹嶠既得還都乃奏敦逆謀請先為之備及敦搆逆加嶠中壘將軍持節都督東安北部諸軍事敦與導書曰太眞别來幾日作如此事表誅奸臣以嶠為首募生得嶠者當自拔其舌與王導書陶侃郭黙殺方州即用為方州害宰相即用為宰相乎足下自謂遵飬時晦是乃遵養時賊也晉書曰郭黙矯詔殺平安將軍劉𦙍陶侃上表討黙與王導書云郭黙殺方州即用為方州殺宰相便為宰相乎導答曰黙居上流之勢如有船艦成資故苞含隠忍使有其地一月潜嚴足下軍到是以得風發相赴豈非遵養時晦以定大事者耶侃省笑曰是乃遵養時賊也合二事為一書誤瓊寢玉簀秇林伐山劉聰以婢為后王鍳諫曰不可以汗玉簀而塵瓊􅃦載記云王沉養女年十四有妙色劉聰立為左皇后王鍳等諫云縱沉之女弟刑餘小醜猶不可塵瓊􅃦汙清廟况其家婢耶今直以為婢且増玉簀何也陸抗晉陸抗拜侍中謂賓客曰以我為三公是天下為無人唐鄭棨聞拜相曰鄭五作相天下無人矣二子審已量力其視力小任重折足覆餗而猶不知止者有異矣此陸玩之言也抗三國吳人今以玩為抗誤尺牘清裁與王丞相書玩作琬又誤茗柯酩酊醉貌晉山簡傳及世說皆作茗艼盖假借字也又簡文帝曰劉尹茗仃有實理茗仃亦茗艼也今本一作茗柯于義不貫餘録晉書作酩酊此云作茗艼誤晉簡文公劉尹茗柯有實理注言如茗之枝柯小實非外博而中虛也秇蔡叔子云韓康伯雖無骨幹然亦膚立合二條觀之膚立者茗柯之反也宋有謠曰臻蓬蓬外頭花艶裏頭空正可對茗柯此世說之語注柯一作打一作仃一作闕原無定字何嘗有解豈又古本耶宣政雜録云宣和初收復燕山金民来居京師者其俗有臻蓬蓬之歌人皆喜而效之其歌曰臻蓬蓬外頭花花裏頭空但看明年正二月滿城不見主人翁本虜䜟故京城不禁然次年正月徽宗南幸次年二月二聖北狩此歌云花花無艶字一本假為注語一云于義不貫已既自相矛盾矣其云偽書誤人得無自道也與㢤小説説者云宋人小説不及唐人是也殊不知唐人小説不及漢人云云晉書荀朂傳云汲郡人不准發冢得古文數百篇載楚事一段尤妙亦小說也惜不傳耳荀朂傳云汲郡冡中得古文竹書詔朂撰次之以為中經列在祕書束晳傳云太康二年汲郡人不准發魏襄王墓或云安釐王塜得竹書數十車大凡七十五篇衛恒傳四書體勢云太康元年汲縣人盜發魏襄王塜得䇿書十餘萬言案敬侯所書猶有彷彿古書亦有數種其一卷論楚事者最為工妙恒竊悦之故竭愚思以賛其美愧不足厠前賢之作冀以存古人之象焉恒云最為工妙為字言也乃指為小説何耶以晳傳恒傳為朂傳併誤金谷序世説新語謂王羲之作蘭亭記人以方金谷序羲之甚有欣色金谷序今不傳其實蘭亭之所祖也余舊得宋人石刻一本今録于此其辭曰余以元康六年從太僕卿出為使持節監青徐諸軍事征虜將軍有别廬在河南縣界金谷澗中或髙或下有清泉茂林衆果竹栢藥草之屬莫不畢備又有水碓魚池土窟其為娛目歡心之物備矣時征西大將軍祭酒王詡當還長安余與衆賓共送往澗中晝夜逰晏屢遷共坐或登髙臨下或列坐水次時琴瑟笙筑合載車中道路並作及住令鼓吹迭奏遂各賦詩以叙中懐或不能者罰酒三斗感性命之不永懼凋落之無期故列敘時人官號姓名年紀又寫詩著後後之好事者其覽之㢤世說品藻篇謝公云金谷中蘇紹最勝注中俱載前文末云凡三十人吳王師議郎關中侯始平武功蘇紹字世嗣年五十為首今云宋人石刻豈容齋所載頭責子羽文意耶王嘉隴西處士王嘉隠居倒處山有異術符堅迎之入長安按嘉字子年今世所傳拾遺記嘉所著也其書全無慿證直搆虛空首篇謂少昊母有桑中之行尤為悖亂嘉盖無徳而詭隠無才而強飾如今之走帳黄冠逰方羽客偽藥欺人假丹誤俗是其故知而移扵筆札世猶傳信之深可怪也㢤嗚呼子書之奥妙不傳者何限而今乃傳鬻子子華子唐詩之佳而不行者無算而世乃盛傳許渾胡曽小説之可觀者多矣而天寳遺事杜詩偽蘇註至今名家亦為所惑且引用焉噫偽書誤人劉子𤣥曰郭子横洞𡨕記王子年拾遺記全構虛辭用驚愚俗卓㢤子𤣥之見也余推其餘如任昉述異記殷芸小說沈約梁四公子記唐人杜陽雜編天寳遺事宋人雲仙散録清異録杜詩偽蘇註盛行於時殊誤學者司馬公作通鑑亦誤取天寳遺事况下此者乎公所引用具列如左瑣語云水㴠萬物之中精潤百物而行乎地中風㴠太𤣥之中精動百物而行乎天上子華子語也引用之而匿其名何㢤旋波移光旋波移光越之美女與西施鄭旦同進扵吳王肌香體輕飾以珠幌若雙鸞之在烟霧拾遺記云越謀滅吳有美女二人一名夷光二名脩明即西施鄭旦之别名以貢扵吳吳處以椒華之房貫細珠為簾幌云云吳王目之若雙鸞之在輕霧杜陽編云元載寵姬薛瑤英仙姿玉質肌香體輕雖旋波搖光不能過也所引合二事為一想未見正本耳拾遺記西海之西有浮玉山山下有穴穴中有水其色如火波濤灌蕩而火不滅名曰隂火木𤣥虛海賦所云隂火潜然者也然李善及五臣註皆不引之商芸小說云晉眀帝問沭啓云沭伏乆勞極不審尊體何如拾遺記曰禹治水所穿鑿處皆泥封記使𤣥龜升其上此封堠之始予又考述異記云空同山有堯碑禹碣皆科斗書香雲香雨雨未嘗有香也而李賀詩依㣲香雨青氛氲元㣲之詩雨香雲淡覺㣲和雲未嘗有香而盧象詩云雲氣香流水拾遺記云員嶠之山名環丘有雲石廣五百里或四五十或十數里駁駱如錦川扣之則片片蓊蓊然雲出俄而遍潤天下西有星池周千里水色隨四時變化有神龜出爛石之上此石常浮于水邊方數百里其色多紅質虛似胏燒有煙香聞數百里煙氣升天則成香雲遍潤則成香雨此謂雲雨無香誤若云偽書誤人則隂火潜然固嘗引之以病選注矣子年神竒先覺非逰方誤俗者見晉藝術傳與謝安石書尺牘王右軍坐而獲逸遂其宿心比常與安石東逰山海頥養閑暇之餘欲與親故時共歡宴䘖杯引滿語田里所行故以為撫掌之資其為得意可勝言耶常依依陸賈班嗣之處世老夫志願盡於此也分甘帖王羲之諸君子孫逰觀有一味甘剖而分之以娛目前晉書曰初羲之既優㳺無事與吏部郎謝萬書曰古之辭世者或被髮佯狂或汙身穢跡可謂艱矣今僕坐而獲免遂其宿心其為慶幸豈非天賜違天不祥頃東逰還脩植桑果今盛敷榮率諸子抱弱孫㳺觀其間有一味之甘割而分之以娯目前雖植徳無殊邈猶欲教養子孫以敦厚退讓戒以輕薄庶令舉䇿數馬彷彿萬石之風君謂此何如比當與安石東㳺山海并田視地利頥養閑暇衣食之餘欲與親知時共歡宴雖不能興言髙詠䘖杯引滿語田里所行故以為撫掌之資其為得意可勝言耶常依陸賈班嗣楊王孫之處世甚欲希風數子老夫志願盡扵此也前人名差誤後剪截欠通諸所引證詎可慿耶宗少文越王金鑄范少伯晉帝圖畫宗少文遙聞聲而相思也秦皇未見韓非則思與之並世不可得既見非則殺之武帝未見相如則思與之並世不可得既見相如則擯之日進前而不䘖也宋書曰宗炳字少文髙祖領荆州辟為主簿不起髙祖開府辟召下書曰吾沗大寵思延賢彦而兎罝潜處考槃未至側席丘園良増虛佇南陽宗炳雁門周續之並植操幽棲無悶巾褐可下辟召以禮屈之扵是並辟太尉掾皆不起宋受禪屢徵並不應元嘉二十年炳卒時年六十九呉越春秋范蠡既去越王乃使良工鑄金象蠡之形置之坐側朝夕論政今曰晉帝何帝耶蠡去乃為鑄金何得云聞聲耶太極泉宋孝武帝大明七年赦詔文曰思散太極之泉以福無方之外太極之泉不知何語後閱酉陽雜爼仙藥有太極泉盖神瀵盎漿之類也宋齊六代文人每好用僻事例如此禮含文嘉曰禮天子靈臺為萬物獲福於無方之源招太極之清泉以與稼穡之根酉陽雜爼仙藥有太極井泉此唐段柯古所著也南宋安得預讀其書耶既誚其虛誑又取以證者何耶紫􅋆南史義陽王㫤傳六軍戒嚴應須紫􅋆𢎞明集𤣥光辯惑論張魯鋒帶盧循紫􅋆南宋晉安王子勛傳子勛初檄欲攻子業聞其已隕即解甲下􅋆讀者多不知紫􅋆為何物按晉書職官志云袴褶之制未詳所起冠黒帽綴紫􅋆􅋆以繒為之長四尺廣一寸腰有絡帶以代鞶中官紫􅋆外官絳􅋆盖戰裙之絡繫也今畫門神將軍有之俗曰飄帶又梁楮緭使魏元日作詩曰帽上著籠冠袴上著朱衣即指此也南史宋書㫤及子勛本傳並無紫􅋆字宋景和中討義陽王㫤六軍戒嚴須應紫􅋆左右欲營辦王琨曰元嘉初征謝晦有紫􅋆在匣中不須作檢取果得焉南史王琨傳廢帝子業為壽寂之所弑鄧琬為子勛傳檄京師明帝遣邵宰還荆州經過襄陽袁顗馳書報琬忽解甲并奉表勸子勛即位郢州及聞明帝定大事即解甲下摽繼聞襄陽不息而顗又響應宋書琬傳𤣥光論張角黄符子魯戴絳盧悚紫􅋆孫恩孤虛晉輿服志袴褶之制未詳云云曰職官志誤秇林伐山又以紫􅋆出梁書職官志梁書有志否耶南史梁楮緭同陳伯之降魏亦非使也石城樂詩話詩紀亦載石城樂宋臧質作碧玉歌一名千金意晉孫綽作慕容攀墻視慕容垂作樂府皆失其名當表出之唐書樂志云石城樂者宋臧質所作也石城在竟陵質嘗為竟陵郡於城上眺矚見羣少年歌謠通暢因作此曲樂苑云碧玉歌者宋汝南王所作也碧玉汝南王妾名以寵愛之甚所以歌之其二篇云碧玉小家女不敢攀貴徳感郎千金意慙無傾城色慕容垂歌晉書載記云慕容垂本名􅆙尋以䜟記乃去夬以垂為名慕容雋僣號封垂為吳王太元八年自稱燕王其二章云慕容愁憤憤燒香作佛㑹願作墻裏燕髙飛出墻外以上俱樂府所載此云云誤通志情人桃葉歌亦曰千金意不云碧玉歌也梅根冶古冶字或借作野金陵有冶城楊子江有梅根野或作冶字而音渚齊武帝詩昨經樊鄧役阻潮梅根冶探懐悵往事意滿辭不敘劉文房詩落日蕪湖色空山梅冶烟孟浩然水溢梅根冶烟迷楊葉洲皆以冶為野也楊州記云冶城呉時鼓鑄之所吳平猶不廢王茂𢎞所治也寰宇記宣州有銀冶今廢庾信枯樹賦云北陸以楊葉為關南陵以梅根作冶南畿志池州有梅根河源出九華山㑹扵五溪支流入於江銅陵縣有銅官山有泉冬夏不竭可以陵鐵烹銅因改為銅官山嘗於此置塲估客樂估客樂齊武帝之所作也其辭曰昔經樊鄧役阻潮梅根渚感憶追往事意滿辭不敘阻潮一本作假楫武帝作此曲令釋寳月被之管絃帝遂數乗龍舟㳺江中以紝越布為帆緑絲為帆縴鍮石為篙足篙傍者悉著鬱林布作淡黄袴舞此曲用十六人云按史稱齊武帝節儉嘗自言朕治天下十年當使黄金與土同價然其從流忘返之奢如此貽厥孫謀何怪乎金蓮步地也此子詩話所載何渚不作冶耶南史何尚之告休定省傾朝送别於冶渚可云渚渚耶浩然夜泊宣城界排律中火熾梅根冶不云水溢也曰梅冶烟曰火熾梅根冶則冶中之烟冶中之火也今曰野豈野燒耶蠱冶通用易冶容誨淫太平廣記引之作蠱容誨淫左傳女惑男曰蠱國語蠱女縱欲張平子西京賦妖蠱艶夫夏姬美聲暢于虞氏南都賦侍者蠱媚巾韝詳明五臣注作冶媚馬融廣成頌古冶字作蠱字可證廣記引易見第㡬卷何不明言意謂廣記繁富人難遍閱故每借之以欺人耳海觀張天錫錫作文極敏捷而用事率出杜撰人有質之者則髙聲應之曰出太平廣記盖其書世所罕也七脩類藁公引廣記無亦天錫之故智乎西京賦良注曰蠱艶美也南都賦注良曰蠱媚美容也並無冶字廣成頌田開古蠱注音冶不云古字夫一冶字也欲野則野欲蠱則蠱為子字者不亦難乎使公冶長有知又將有用脩大横之誚矣瓊瓊赤玉也謝希逸雪賦林挺瓊樹世豈有赤雪耶李義山已隨江令誇瓊樹李長吉詩曰夭碎碎墮瓊芳相承誤用皆不考之過也晉朝雜事云大康七年雨赤雪二頃唐五行志貞元二十一年正月雨赤雪於京師可云無赤雪耶選注善云瓊赤玉也瓊樹恐誤已先言之矣詩木𤓰報之以瓊琚報之以瓊瑤報之以瓊玖毛氏云瓊玉之美者孔安國曰瓊是玉之美名非玉名也丘中有麻傳云玖石次玉是玖非全玉也什文曰玖字書云玉黒色錢氏曰詩言玉以瓊者多如著瓊華瓊英瓊瑩木𤓰瓊琚瓊瑤瓊玖皆謂玉色之美非玉之名也許叔重曰瓊赤玉也然木𤓰所謂瓊玖玖乃黒玉亦非赤也反騷精瓊靡應劭曰瓊玉之華也張融海賦文選載木𤣥虛海賦似非全文南史稱張融海賦勝𤣥虛惜今不傳北堂書抄載其畧如湍轉則日月似驚浪動則星河如覆信為竒也南齊書思光傳中具載特字句脱落難讀耳何以惜其不傳耶北堂書抄無海部二句見藝文類聚劉須溪世以劉須溪為能賞音為其於選詩李杜諸家皆有批㸃也予以為須溪元不知詩其批㸃詩首云詩至文選為一厄五言盛於建安而勃窣為甚此言大本已迷矣須溪徒知尊李杜而不知選詩又李杜之所自出予嘗謂須溪乃開剪截羅段舖客人元不曽到蘇杭南京機坊也前引北堂書抄惜海賦不傳公自謂開舖客人耶到機坊者耶答劉繪書沈約尺牘郭有道漢末之匹夫非蔡中郎不足以偶三絶謝安石素族之台輔時無麗藻乃有碑無文况文憲王冠冕彛倫儀刑宇内自非一代詞宗難或為此約閭閈鄙人名不入第􅗄訓令㫖便是以禮許人聞命慙顔已不覺汗之沾背也繪請沈約為竟陵王碑文約答書辭之後竟為之今文選有此碑文當以此入補註此沈約答樂藹書云答劉繪誤文選有齊安陸昭王緬碑文無竟陵王碑也謂當入補註不知寘之何所南齊書文獻豫章王嶷也文宣竟陵王子良也以文宣為文獻是又以徳昇為景昇也以獻為憲亦誤子良傳故吏范雲上表為子良立碑事不行文選有任昉竟陵王行狀又非休文也梁武帝父子詩䜟梁武帝冬日詩雪花無有蔕冰鏡不安臺梁簡文詠月詩飛輪了無轍眀鏡不安臺竟成二䜟南史賊臣侯景傳云簡文寒夕詩云雪花云云又詠月詩云飛輪云云後人以為詩䜟謂無蒂者是無弟不安臺者臺城不安輪無轍者以邵陵名綸空有赴援名也謂梁武父子誤和南六朝及唐初稱和尚為和南今法帖中有此語觀者不解也禪林鈎𤣥𢎞明集習鑿齒與釋道安書鑿齒稽首和南云云弟子襄陽習鑿齒稽首和南李交州淼與釋道高難佛不見形書云云伏願大和尚垂懐允納下心無惜神誥弟子李淼和南龍潭崇信禪師請居天皇寺示心要皇曰汝擎茶吾為汝接行食吾為汝受汝和南時我便低首廣𢎞明集徐陵諫深法師罷道書言必闍黎和尚書輒致敬和南今以和尚為和南誤矣僧家謂合掌作禮曰和南禪苑清規法苑珠林云和南者梵語也或云那漠婆南要律儀翻為恭敬善見論翻為度我㺯今之巷道名為胡洞字書不載或作衙衕又作􅜋㣚皆無據也南齊書蕭鸞弑其君昭于西㺯注㺯巷也南方曰㺯北曰􅜋㣚㺯之反切為􅜋㣚也盖方言耳南齊書云欝林王昭業字元尚蕭鸞使蕭諶引兵入壽昌閣帝行至西㺯殺之無注欝林名昭業海陵名昭文余録總録俱無業字大誤胡三省通鑑注丁度集韻曰㺯厦也屏也亦作􅂒説文衙行貌魚舉切又音牙衕通街也徒弄切兀即秃字巵言梁書侯景傳載寳誌公䜟曰兀尾狗子始著狂兀與秃同从元去其上畫最有㑹意之旨梁天監中釋寳誌曰掘尾狗子自發狂南史同今作兀尾謂與秃同豈介甫字說意耶大鳯譚苑通史繳大鳯於青丘戮脩蛇于洞庭大鳯作大風内典引古䜟記鳯鳯逆序蒼蒼舛度注鳯音梵鳯字當作􅂒從馬非鳯凰之鳯也予舊著古音駢字古音附録亦誤從之今特正之於此淮南子云堯使羿繳大風于青丘之澤注大風風伯也梁武通史採異蕪累撰次無幾殘缺遂多史通據此則通史似即不行矣乃遺淮南而引之耶皇帝受天睠命四海樂推于時鳯鳯裂序蒼蒼舛度乃選五石以補之坤軸傾斜積冰發坼乃緯九藪而正之是以天徳一於上地數二於下廣𢎞明集二十鳯鳯云云簡文大法頌序語非引古䜟也鳯鳯注云梵音亦非音梵也集韻几音洙部内無馬字嫪古音余嫪說文云婟也要雅倡謂㳺婿曰婟嫪韓退之詩感物増戀嫪聲類戀惜也韓薦士詩念將決焉去感物増戀嫪廣韻嫪悋物也史嫪毐注音流説文士無行者曰嫪毐梁劉杳傳有要雅五卷舊唐書已不載其名獨公家尚藏其書耶史稱杳愽綜清儉自居母憂便長齋蔬食盖端士也書名要雅乃載此鄙䙝語耶錦繖夫人馮寳妻洗氏封石龍夫人戰則錦繖寳幰至老未嘗敗年八十而終知勇福三者全矣古今女將第一人也綉旗女將與李全戰者見金史可對錦繖夫人綉旗女將見宋史李全傳止云綉旗女將馬上衝擊未審何人此云金史考李全未嘗降金當是楊誤洗氏六朝人見史鑑綱目等書婦人知大義者不止知勇福也胡應麟筆叢洗氏梁大同初髙梁太守馮寳聘以為妻陳永定初子僕拜陽春郡太守廣州刺史歐陽紇反夫人發兵拒境僕以夫人功加中郎將轉石龍太守詔冊夫人為髙涼郡太夫人賫綉幰油絡駟馬安車陳亡王仲宣反圍隋摠管韋洸夫人進兵共敗之夫人親披甲張錦傘領彀騎衛詔使裴矩巡撫嶺南悉定封譙國夫人北史列女傳隋書冊為中郎將石龍太夫人似誤金騎奄至李全殺數人逐北抵山谷上有龍虎上將軍者盛兵以出旁有綉旗女將馳搶突鬭會諸將至拔全以出宋史叛臣傳楊云洗封石龍夫人戰則錦繖云云年八十終誤胡謂洗六朝人見史綱等書似亦未讀正史也正楊卷三
