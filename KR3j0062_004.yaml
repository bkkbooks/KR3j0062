body:
  text: 正楊卷四明陳耀文撰苮席梁崔祖思政事疏曰劉備取帳構銅鑄錢以充國用魏武遺女皇帳婢十人東阿王婦以繡衣賜死宋武帝節儉過人張妃房帳碧紗蚊幬三齊苮席五盞盤桃花米飯祖思所引二君事皆本史所不載者又苮席不知何物字書亦無苮字字書苮音仙草名似莞何云字書無其字答廣信侯書晉安王仰承縦賞山中遊心人外往而不返有㑹昔言牽物從務無由獨往仰此髙蹤寸心如結晉安梁簡文未為太子時封也廣信侯蕭映也書見廣𢎞明集此寘之晉明帝陸琬劉琨間蓋見有晉字耳與東宫官書弔王規司空王㫤王威明風韻遒上神峯標映千里絶迹百尺無枝實俊人也一爾過隙永歸長夜金刀掩芒長淮絶涸杜少陵詩淮海維揚一俊人本此梁書曰王規卒皇太子出臨哭與湘東王令曰威明昨宵奄復殂化甚可痛傷其風韻云云斯實俊民也云云俱往之傷信非虚說此梁簡文令也今曰司空王㫤誤㫤見三國魏志何氏語林作昭明誤王元美尺牘因之亦誤書曰俊民用章國䇿武靈云俗僻而民易是吳越無俊民也此所引南史中節文避唐諱改民作人安得子美之詩為出此耶江淹雜體詩朱黻咸髦士長纓皆俊人則又前於簡文矣灧澦歌詩話灧澦歌云灧澦大如襆瞿唐不可觸金沙浮轉多桂浦忌經過此舟人商估刺水行舟之歌樂府以為梁簡文所作非也蜀江有瞿唐之患桂江有桂浦之險故涉瞿唐者則準灧襆涉桂浦者則準金沙今樂府桂浦作桂楫非也此引通志而誤者水經注云白帝山城水門之西江中有孤石名滛豫石江水東逕廣峽谿乃三峽之首也峽中有瞿塘黄龕二灘夏水回復沿泝所忌國史補曰蜀之三峽最號峻急四月五月尤險故行者歌之此樂府所載不云簡文作桂浦亦非作桂楫也集文選文士姓名梁昭明太子統聚文士劉孝威庾肩吾徐防江伯操孔敬通惠子悅徐陵王囿孔爍鮑至十人謂之髙齋十學士集文選今襄陽有文選樓池州有文選臺未知何地為的但十人姓名人多不知故特著之此統志所載已誤今云特著之又誤庾肩吾初為晉安王國常侍王每徙鎮肩吾常隨府在雍州被命與劉孝威江伯揺申子悅徐摛孔鑠等十人抄撰衆籍號髙齋學士南史肩吾傳襄陽有文選樓金城内刺史院有髙齋昭明於此造文選襄沔記隋煬帝自達江陵嘗幸昭明文選樓車駕未至先命宫娥數千人昇樓迎侍微風東來宫娥衣被風綽直泊肩項帝觀之色荒愈熾隋遺録徐摛初為晉安侍讀簡文置文德省學士摛子陵充其選陵操惠爍字俱誤統志文選閣云臺亦誤狐疑鼬預梁黄門侍郎明少遐曰狐性多疑鼬性多預狐疑猶預因此而傳耳乃知猶即鼬也此語惟見酉陽雜俎輒以鼬為猶恐亦難據郭璞曰鼬似鼦赤黄色大尾啖䑕江東呼為鼪爾雅曰猶如麂善登木此獸性多疑慮常居山中忽聞有聲則恐人來害之每預上樹久久度無後下須臾又上如此非一故不決者稱猶又說文隴西稱犬子為猶俗謂犬子隨人行每預前待人不得又來迎候故言猶豫也漢書作猶與孟婆俗謂風曰孟婆蔣捷詞云春雨如絲繡出花枝紅裊怎禁他孟婆合皂宋徽宗詞云孟婆好些方便吹箇船兒倒轉江南七月間有大風甚於舶䑲野人相傳以為孟婆發怒按北齊李騊駼聘陳問陸士秀江南有孟婆是何神也士秀曰山海經帝之女遊於江中出入必以風雨自隨以帝女故曰孟婆猶郊祀志以地神為泰媪此言雖鄙俚亦有自來矣宋徽宗在北虜清明日詩曰茸母初生認禁烟茸母草名北地寒食茸母生無家對景倍凄然帝城春色誰為主遥指鄉闗涕淚連又戲作小詞云孟婆孟婆你做些方便吹箇船兒倒轉孟婆宋汴京勾欄語謂風也茸母孟婆正是的對邵桂子甕天解語别尺㑹録徽宗既内禪㝷幸淮浙嘗作小詞名月上海棠末句云孟婆且與我做些方便隆祐保佑之功蓋䜟于此諺語謂風為孟婆非也段公路北戸録云南方祀船神呼為孟姥孟公雲麓謾抄齊使李騊駼至江南問陸士秀曰江南有孟婆是何神也士秀曰山海經帝之二女游于江郭璞注天帝二女尊之為神由此言之則孟婆也以天女尊之為孟猶郊祀志以地神為泰媪也騊駼曰僑南之辨無以加焉談藪見蘇州舊志按此云尊之為神不云風雨自隨也引之而遷就以證風誤漢書媪神蕃釐陸云泰媪亦誤二唐書五代劉昫所修唐書因宋祁歐陽修重修唐書遂有新舊唐書之名舊唐書人罕故不知其優劣余觀姚崇十事要說此其大闗鍵而舊書所傳問答俱備千年之下猶如面語新書則剪截晦澀事既往文又不通良可慨也宋人徒欲誇當代以誣後世不知可盡誣乎今具載二書之文於左二書辭多不書新唐書姚宋傳贊曰姚崇十事要說天子而後輔政顧不偉哉而舊史不傳觀開元初皆以施行信不誣已困學紀聞云崇十事見開元昇平源通鑑不取通鑑考異云昇平源人假吳兢所作故不取云今數書具在可得云云耶劉履作選詩補註所見寡陋如儲光羲詩格澤為君駕格澤星名大人賦建格澤之長竿是也履乃云獅子名曰白澤白與格相近白澤即格澤也此何異村學究之欺小童耶甘氏星經彼不㸃目諸史天文亦當觸手臆說若此何以註為據此譏評劉氏自視前無古人矣如二唐書優劣之辨不知於前數書亦曽㸃目觸手否耶大人賦注格澤氣如炎火狀起地上至天不云星也補注格澤說文師子一名白澤疑即此也無白格相近二句石有赤心唐語林武后時爭獻祥瑞洛濵居民有得石而剖之中赤者獻於后曰是石有赤心后欲賞之李日知曰此石固有赤心其餘豈皆謀反耶唐英所引蓋此事語林罕傳人亦鮮知此語所出誠可為史中笑柄耳舊唐書云有人於洛水中獲白石數㸃赤詣闕輒進諸宰相詰之對云此石赤心所以來進李昭德叱之曰此石赤心洛水中餘石豈能盡反耶左右皆笑新唐書同語林亦非異書也云日知誤小司馬索隠注誤司馬遷既論商鞅刻薄少恩又讀鞅開塞書謂與其行事相類卒受惡名有以也索隠曰開謂刑嚴峻則政化開塞謂布恩惠則政化塞今考其書司馬承禎蓋未嘗見之妄為之說耳開塞乃其第七篇謂道塞久矣今欲開之必刑九而賞一刑用於將過則大邪不生賞施於告姦則細過不失由是觀之鞅之術無他獨恃告訐而止耳故其治不告姦與降敵同罰告姦者與殺敵同賞此秦俗所以日壞至於父子相夷而鞅自不能脫也太史之言信不誣乎此全抄晁氏說耳索隠司馬貞所著晁云正者避宋諱耳謂承禎誤甚商君啓塞篇云興王有道而持之異理武王逆取而貴順今世强國事兼併弱國務戰守故萬乗莫不戰千乘莫不守此道之塞久矣而世主莫之能廢也故三代不四非明主莫有能聽也今日願啓之故王者刑九而賞一削國賞九而刑一夫過有厚薄則刑有輕重善有小大則賞有多少此二者世之常用也故王者用刑云云不失而國治矣說民篇云塞私道以窮其志啓一門以致其欲使民必先其要然後致其所欲此商君書也晁氏開塞之說然耶淮南云商鞅之啓塞張儀之縦横皆掇取之權一切之術也注啓之以利塞之以禁商鞅之術也鹽鉄曰商君明于開塞之術為秦致利成業索隠曰商君書云云是司馬撮其意以什之如淮南註意耳可云未見妄說耶按諸書開塞俱實字也乃云塞矣開之不類夫農者寡而游食者衆故其國貧危雖有詩書鄉一束家一貟獨無益于治也非所以反之術也去强治法已定矣而好用六蝨者亡六蝨曰禮樂曰詩書曰脩善曰孝弟曰誠信曰貞廉曰仁義曰非兵曰羞戰十二者成羣此謂六蝨勝其政也靳令商君焚書已見前卷此書乃其見諸行事者也劉綺莊詩續南部烟花録有劉綺莊揚州送人詩云桂楫木蘭舟風行竹箭流故人從此去逺望不勝愁落日低帆影歸風引棹謳思君折楊栁淚盡武昌樓綺莊不知何時人詳詩之聲調必初唐也綺莊大厯時為崑山尉作崑山編中吳紀聞綺莊善樂府嘗守藩服與白敏中崔元式韋琮相知宣宗時人也唐詩紀事綺莊集有上白敏中啓桃花行唐自貞觀至景龍詩人之作盡是應制命題既同體製復一其綺繪有餘而微乏韻度獨蘇頲東望望春春可憐一篇迥出羣英矣予又見中宗賞桃花應制凡十餘人最後一小臣一絶云源水藂花無數開丹枝紅蕚間青梅從今結子三千嵗預喜仙遊復摘來此詩一出羣作皆廢中宗令宫女唱之號桃花行惜不知作者名然宋元近時選唐詩者將百家無有選此者未之見耶不之識耶景龍文館記云四年春上宴於桃花園羣臣畢從學士李嶠等各獻桃花詩上令宫女歌之辭既清婉歌仍妙絶獻詩者舞蹈稱萬嵗上敕太常簡二十篇入樂府號曰桃花行文苑英華徐彦伯詩也何謂不知作者名耶又謂最後小臣及諸作皆廢亦誤劍門詩予往年過劍門關絶壁上見有唐明皇詩云劍閣横空峻鑾輿出狩回翠屏千仞合丹嶂五丁開灌木縈旗轉仙雲拂馬來乗時方在德嗟爾勒銘才是詩英華及諸唐詩皆不載故記於此此詩品彚本集等多載横空峻一本作盤空度今云諸唐詩皆不載何耶唐詩紀事云帝幸蜀西至劍門題詩曰劍閣横雲峻云云至德二年普安郡守賈深勒石出開天傳信記苦水變甘泉李錫之蘆城令變苦泉為甘泉凡水之性味色香出沒顯伏皆地脈之異有所産歟白集錫為虞城令非蘆也裋褐杜少陵冬日懷李白詩裋褐風霜入惟宋元本仍作裋今本皆作短褐裋音䜿二字見列子丹鉛録杜詩注引漢書貢禹裋褐不完兹云宋元本豈今所傳皆古本耶列力命篇衣則裋褐食則粢糲注楚人謂袍為裋有作短褐者誤公今本之說豈假此以愚衆耶李白李白生於彰明縣之青蓮鄉其詩云青蓮居士謫仙人是也讀書於康山康山亦在彰明杜工部寄李太白詩所謂康山讀書處頭白好歸來是也晏元獻公類要引此詩今人不知乃改康為匡廬山且太白在廬山亦是寓居何得言歸來乎譚苑彰明唐之昌明劉全白太白墓碣云太白廣漢人蓋唐世彰明屬廣漢郡故獨舉郡為稱耳上唐詩紀事東蜀楊天惠彰明逸事云太白本邑人微時募縣小吏棄去隠居戴天大匡山依潼江趙㽔為縱横學益州刺史蘇頲見而異之此蓋公之先著鞭者廬山疏辨其淺偽按太白寄趙㽔詩故人不可見非與師語與裴長史書蘇公出為益州長史白於路中投刺非刺史也舊唐志漢州屬廣漢郡隋併入蜀郡唐因之昌明屬綿州不屬廣漢通典同東林夜懷詩我尋青蓮宇獨往謝城闕注梵宫答從姪中孚序云後之髙僧大隠知仙人掌茶發乎中孚禪子及青蓮居士李白也容齋二筆云杜贈李詩匡山讀書處頭白好歸來説者以為即廬山也吳曽能改齋漫録内辨誤一卷引杜田杜詩補遺云范傳正李白新墓碑云白本宗室子厥先避仇客蜀居蜀之彰明太白生焉彰明綿州之屬邑有大小康山白讀書於大康山有讀書堂見存其宅在清廣鄉後廢為僧房稱隴西院蓋以太白得名院有太白像吳君以是證杜句知康山在蜀非廬山也予按當塗所刋李集首載范碑凡千五百餘字但云自國朝以來編於屬籍神龍初自碎葉還廣漢因僑為郡人初無補遺所紀七十餘言豈非好事者偽為此書如開元遺事之類以附㑹杜老之詩耶歐陽忞輿地廣記云彰明有李白碑白生於此縣蓋亦傳說之誤當以范碑為正謝顥廣福觀碑云威烈王以安車迓匡續續僊去惟廬存因命其山為靖廬山邦人以先生姓呼匡山又曰匡阜圖經云廬山五老峯下有李太白書堂太白云予行天下所游覽山水甚富俊偉詭特鮮有能過之者真天下之壯觀也遂卜築焉它日將歸中原猶戀戀不忍去指山而矢之曰期君再㑹不敢寒盟丹崖翠壑尚其鑒之廬山疏太白書堂在青玉峽西一里所登五老峯詩云九江秀色可攬結吾將此地巢雲松望瀑布詩且諧宿所好永願辭人間贈王判官詩云吾非濟代人且隠屏風疊題云時余隠居廬山之屏風疊觀此匡山為匡廬無疑可補容齋之說李白家世李太白上裴長史書自敘云白家本金陵世為古姓遭沮渠蒙遜之難奔流寓家少長江漢見鄉人相如大誇雲夢之事云楚有七澤遂來觀焉又與逸人東巖子隠於岷山之陽巢居數年不跡城市廣漢太守聞而異之因舉二人有道並不起按此則唐書謂白為隴西人唐之宗室謬也唐之先豈有金陵之籍哉少長江漢蜀之彰明以相如為鄉人隠居在岷山舉有道於廣漢為蜀人無疑譚苑上裴書白家世金陵云云奔流咸秦因官寓家按此原有咸秦字今止云奔流寓家蓋遷就已說謂非隴西也故知掩耳盜鐘吕氏非為虚說又與韓荆州書白隴西布衣流落江漢贈張鎬詩本家隴西人作賦凌相如范傳正誌白涼武昭王九世孫昭王隴西人云云新唐書因之公引誌中語謂附見白集古本此以唐書為謬何哉且公以相如為鄉人似也乃云少長江漢蜀之彰明江漢盡彰明地耶又送從弟耑遊廬山云余小時大人令誦子虚賦私心慕之及長南游雲夢酒隠安陸今觀地圖雲夢在蜀東偏白果蜀人不得云南游也東山李白杜子美詩近來海内為長句汝與東山李白好流俗本妄改作山東李白按樂史序李白集云白客遊天下以聲妓自隨效謝安風流自號東山時人遂以東山李白稱之子美詩句正因其自號而稱之耳流俗不知而妄改近世作大明一統志遂以李白入山東人物類而引杜詩為證近於郢書燕說矣噫寡陋一至此哉舊唐書元稹杜甫墓誌云時山東人李白亦以竒文取稱時人謂之李杜南部新書白山東人父為任城尉因家焉少與魯中諸生隠徂徠山號竹林六逸天寶初游㑹稽與吳筠隠剡中舊唐同筠徵赴闕薦之於朝與筠俱待詔翰林俗稱蜀人非也今任城令㕔石記白之詞也見存焉按元劉去太白不逺或當不誤統志濟南流寓白蜀人唐宗室客游任城不引杜詩也燕說寡陋之誚豈又别出閣本耶樂史序本集具載併無慕謝安風流自號東山之事傳正新碑杜田既欺人於前代樂史集序吾子復作偽於今時故知心勞日拙實繁有徒矣吳元濟將敗之兆秇林伐山裴度征淮西掘得一碑上有謡云井底一竿竹竹色深緑緑鷄未肥酒未熟陣車兒郎且須縮有識之者曰鷄未肥肥去月乃己字酒未熟乃酉字後果以己酉日擒吳元濟宋人四六有學慙䑕獄智乏鷄碑下句正用此事䑕獄張湯傳晉書云戴逵總角時以鷄卵汁溲白瓦作鄭𤣥碑又自為文而自鐫之詞麗器妙宣室志云元和十三年裴度擊吳元濟封人濬城濠有得一石者上有雕出文字為銘曰云云有一卒辨之度擢為禆將此止云石不云碑曰銘不曰謡也所引二句唐丁用晦芝田録序語也亦非宋人四六綱目減字巵言司馬温公資治通鑑云補闕喬知之有婢名碧玉美色善歌舞知之為之不昏昏與婚古字通用蓋言知之惑溺此婢不娶正室也綱目去一字而云知之為之昏蓋誤以婚姻為昏惑之昏也字義不明文理不通綱目似此類極多蓋朱子門人趙師淵奉師命所編朱子固無與也師淵史學既非所長而古文又未經心其疎舛固宜今人以為出於朱子合於春秋殆魏子牟所謂承餘竅之鄙夫誠可笑也綱目云知之有美妾曰碧玉武承嗣奪之知之作緑珠怨詩以寄之碧玉赴井死承嗣得之于裙帶大怒諷酷吏羅告族誅之通鑑云知之為不昏綱目去四句云昏惑之昏誤李泌李肇誣李泌定麻姑送酒朱子綱目亦不取麻姑送酒事李泌匡復之功亦大矣此小過似可恕也况温公通鑑元以此事入考異傳疑綱目乃升為正文君子與人為善之意何在乎或門人妄筆非朱子本意綱目泌有謀畧而好神仙詭誕故為世所輕與通鑑同考異固有之綱目未始升為正文也大顛韓文公與大顛書前人論之詳矣蘇東坡則力言其為偽朱晦菴則力辨以為真未有折其衷者予觀黄東發之說有云韓與大顛書東坡謂妄撰而晦翁載其全書以為真愚平生讀其書真見其與韓文同蘇公學佛猶辨其為偽而先生闢佛反指以為真所不可曉况據韓文韓公止因祭神至海上曾與大顛語今請之者四書又亟以道為望安有平日謂道其所道非吾所謂道而一旦求之亟如此使其既與習熟而少變其說尚近人情今未之曽見而先欲聞其道尤不可曉也愚按東發朱子之徒而其說如此天下之公言也又有一證人未之引李漢編韓文序謂收拾遺文無有失墜總其目七百篇今内集是也外集皆非公作而此書正在外集其為妄撰尤灼然矣或曰晦翁必欲以大顛書為韓之真何也予曰此殆難言也可以意喻昔歐陽公不以始倡古文許尹師魯評者謂如善奕者常留一著歐公之於尹師魯留一著也然則朱子之於韓公亦猶歐陽之於師魯乎不然朱子豈不知大顛書詞非韓公之筆東坡之言為可信又豈不知外集非韓公文李漢之序可據耶朱子語録謂與大顛書乃昌黎平生死案嗚呼晦翁之言抑何其秋霜烈日耶愚考韓與大顛書刻石於靈山禪院乃僧徒妄撰假韓公重名以尊其道亦猶懷素假李白歌稱其草書獨步也懷素草書歌人皆信其非白作而獨以大顛書為出於韓何哉李白作歌贈懷素不足以損白之名而韓公以道自任一與顛書則所損多矣世人多不成人之美雖心知其非乃乗瑕蹈隙而擠之卓哉李漢之先見乎序公之文無有失墜總其目以七百正慮後人羼入䦨増以誣韓公也以此證之則死案猶可翻也嗚呼至公無我之心自聖人以下皆不能矣古人謂公論百年而定若此者雖千年猶不定也韓郁外集疑誤注云潮州靈山寺所刻末云吏部侍郎潮州刺史者非也退之自刑部侍郎貶潮晚乃由兵部為吏部流俗但稱韓吏部耳又潮本韓集不見有此書使靈山舊有此刻集時何不編入可見此書之妄也陳氏曰晦菴韓文外集皆如舊本獨用方本益大顛三書決以為韓筆無疑方氏未足責晦翁識髙一世而其所定者乃爾殆不可解前人俱已辨明不能盡書姑寘勿論可也唐詩葳㽔唐詩春樓不閉葳㽔鎖又望見葳㽔舉翠華葳㽔旗名鹵簿中有之孫氏瑞應圖云葳㽔瑞草王者禮備至則生今之字書例解為草木之狀未得其原也録異記葳㽔鎖金縷屈伸在人顧况詩春樓不閉葳㽔鎖緑水迴通宛轉橋秇子虚賦錯翡翠之葳㽔註羽飾貌封禪書紛綸葳㽔胡廣曰葳㽔委頓也張楫曰亂貌南都賦望翠華兮葳㽔建太常兮裶裶注葳㽔翠華貌録異記杜光庭所著無葳㽔鎖事録異傳云建安中劉照為河間太守婦亡埋棺於府園中遭黄巾賊照委郡走後太守至夢見一婦人往就之後又遺一雙鎖太守不能名婦曰此葳㽔鎖也以金鏤相屈伸在人實寶物吾方當去故以相别慎勿告人後二十日照遣兒迎喪守乃悟云云兒見鎖悲痛不能自勝此詩韓翊作非顧况也魏文帝滄海賦振緑葉以葳㽔何晏景福殿賦流羽毛之葳㽔古樂府烏夜啼云歡下葳㽔籥交儂那得住劉孝標與舉法師書葳㽔秋竹照曜春松文心雕龍緯候稠疊鈎䜟葳㽔鄭禺津陽門詩迎娘歌喉玉􅌄窱蠻兒舞帶金葳㽔先引則謂之旗後引則謂之鎖若引此必當謂之籥帶與竹矣石尤風郎士元留盧秦卿詩云知有前期在難分此夜中無將故人酒不及石尤風打頭逆風也行舟遇之則不行此詩意謂行舟遇逆風則住故人置酒而以前期為辭是故人酒不及石尤風矣語意甚工近日吳中刻唐詩不解石尤風為何語遂改作古淳風可笑又可恨也古樂府宋武帝丁督䕶歌云願作石尤風四面斷行旅似非打頭風也瑟瑟白樂天琵琶行楓葉荻花秋瑟瑟此句絶妙楓葉紅荻花白映秋色碧也瑟瑟珍寶名其色碧故以瑟瑟影指碧字讀者草草不知其解也今以問人輒答曰瑟瑟者蕭瑟也此解非是何以證之樂天又有暮江曲云一道殘陽照水中半江瑟瑟半江紅此瑟瑟豈蕭瑟哉正言殘陽照江半紅半碧耳樂天有靈必驚予為千載知音矣劉楨贈徐幹詩曰亭亭山上松瑟瑟谷中風水經云漢水東逕嵐谷北口嶂逺溪深澗峽近吹氣瀟瀟以瑟瑟風颼颼而飀飀故川谷擅其目矣此瑟瑟豈珍寶也耶靺鞨靺鞨國名古肅慎地也其地産寶石大如巨栗中國謂之靺鞨文與可朱櫻歌云金衣珍禽弄深樾禁籞朱櫻班若纈上幸離宫促薦新藤籃寶籠貂璫發凝霞作丸珠尚軟油露成津蜜初割君王午坐鼔猗蘭翡翠一盤紅靺鞨葛魯卿西江月詞云靺鞨斜紅帶栁琉璃漲緑平橋人間花月見新妖不數江南蘇小恨寄飛花􅉡􅉡情隨緑水迢迢鯉魚風送木蘭橈迴棹荒鷄報曉二公詩詞皆用靺鞨事人罕知者故詳疏之唐代宗時楚州尼真如李氏者得天寶曰紅靺鞨大如巨栗赤爛若朱櫻見楚州刺史鄭輅記唐書外國傳靺鞨附勿吉國下亦不云出寶也瀛涯勝覽云靺鞨國西𤓰一枚用二人舉之今紅子西𤓰可云靺鞨乎六赤打葉子李洞集有贈龍州李郎中先夢六赤後因打葉子因以詩上其詩云紅蠟香烟撲畫楹梅花落盡庾樓清光輝圓魄啣山冷彩鏤方牙著腕輕寶帖牽來獅子鎮金盆引出鳯凰傾徵黄喜兆莊周夢六赤重新擲印成六赤者古之瓊畟今之骰子也葉子如今之紙牌酒令鄭氏書目有南唐李後主妃周氏編金葉子格此戲今少傳咸定録云唐李郃為賀州刺史與妓人葉茂蓮江行因撰骰子選謂之葉子咸通以來天下尚之不知正應本朝年祚正體書葉字乃二十世木子自武德至天祐恰二十世歸田録云葉子格者自唐中世以後有之說者云因人有性葉號葉子青者撰此格因以為名此說非也唐人藏書皆作卷軸其後有葉子其制似今䇿子凡文字有備檢用者卷軸難數卷舒故以葉子寫之如吳彩鸞唐韻李郃彩選之類是也骰子格本備檢用故亦以葉子寫之因以為名耳唐世士人宴聚盛行葉子格五代宋初猶然後漸廢不傳今其格世或有之而人無知者昔楊大年好之仲簡大年門下客也故亦能之余少時亦有此格後失其本今絶無知者房千里骰子選格序云開成三年春予自海上北徙舟行次洞庭之陽有風甚急繫船野浦下三日遇二三子號進士者以穴骼雙雙為戲更投局上以數多少為進身職官之差數豐貴而約賤卒局有為尉掾而上者有貴為相臣將臣者有連得美名而後不振者有始甚微而歘升于上位者大凡得失不係賢不肖但卜其偶不偶耳王起隂符經云禽之制在氣王起云𤣥龜食蟒飛䑕斷猿狼蝨嚙鶴青要食虎皆以小制大言在氣不在形也王起唐貞觀時人博學有聲太宗嘗撰字試之起曰臣于世間字所不識者惟八駿圖中數字耳雲溪友議云李筌註黄帝隂符經至禽獸之制在氣經年懵然不解忽夢烏衣人教之所謂𤣥龜云云以小服大皆得烏衣之㫖又云王僕射起武宗召至殿陛曰朕近見二字一一􅀢莫能詳也特詢于卿對曰臣于三教經典竊嘗徧覽向者二字羣書未見未審天顔何文而得周穆王傳有􅀢二字經昔儒宗但言古馬名不敢分為飛兎騕褭于今靡有詳之者也上笑曰知卿夙學儒宗朝偶為此二字相試非于經傳而得之遂賜金綵等以李筌為王起武宗為貞觀俱誤五代史歐陽氏五代史譽之太過其實至云勝于史記此宋人自尊其本朝人物之言要其實未也史記自左氏而下未有其比其所為獨冠諸史非特太史公父子筆力亦由其書㑹輯左氏國語戰國䇿世本及漢代司馬相如東方朔輩諸名人文章以為楨幹也五代史所載有是文章乎况其筆力亦萎靡不振不足為司馬遷家奴而云勝之非欺天罔人而何罔人可爾乃云欺天豈天亦讀書耶子瞻問歐陽公曰五代史可傳後也乎公曰脩於此竊有善善惡惡之志蘇公曰韓通無傳惡得為善善惡惡公黙然野客叢書他如介甫嗚呼之誚二等文字之譏在宋固自有後言矣獨舉一隅詎為定論耶嘉祐中進士吳鎮為五代史纂誤刋行之呂蒙正呂蒙正父龜圖多内寵與其母劉氏不協并蒙正出之頗淪躓窘乏劉誓不嫁及蒙正登仕乃迎二親同堂異室奉養之近世傳竒饐𤓰亭亦縁此附㑹也邵氏聞見録云呂蒙正微時於洛陽之龍門利涉院土室中與温仲舒讀一日行伊水上見賣𤓰者意欲得之無錢可買其人偶遺一枚於地公悵然取食之後作相買園洛城東南下臨伊水起亭以饐𤓰名焉不忘貧賤之意也鵪鶉獄范伯禄曰牽牛以蹊田而奪之牛此王安石鵪鶉獄也謂相牽引以入宋史仁宗嘉祐四年王安石知制誥糾察在京刑獄有少年得鬭鶉其儕求之不與恃與之昵輒持去少年追殺之開封當此人死安石駁之曰不與白持去是盜也追而殺之是捕盜也遂劾府司失獄事下審刑大理皆以府斷為是詔放安石罪安石不謝御史舉奏之帝亦不問此事正與蹊田奪牛事類何謂牽引以入耶雪窖冰天歎馬角之不生魂消雪窖攀龍髯而莫逮泪雨冰天洪皓祭徽宗文宋史朱弁在金奏送徽宗大行之文也王倫歸自金以文為獻帝感泣官其親屬曰洪皓誤容齋隨筆有皓在冷山薦徽宗功德疏云云文多不載龍鍾龍鍾竹名年老曰龍鍾言如竹之枝葉揺曳而不能自禁持也南越志云羅浮山第三十一領半是巨竹皆七八圍長一二丈葉若芭蕉謂之龍鍾竹魏杜弼為侯景檄梁文委慈母如脫屣棄寵弟如遺芥龍鍾稚子痛哭成行周王裒與周𢎞正書云援筆攬紙龍鍾横集裴度云見我龍鍾故相戲耳微時在天津橋言也劇談録元載游秦别妻詩年來誰不厭龍鍾杜陽編昌黎詩白首誇龍鍾董彦逺注潦倒意胡曽謝賜錢啓自嘆龍鍾誰識牛鐸大范小范范仲淹鎮延安夏人相戒曰小范老子胸中有數萬甲兵不比大范老子也注大范名雍仲淹之父傳之至今無人知其誤者按范仲淹作范雍墓志云公諱雍字伯淳蜀人也為龍圖待制振武軍節度使鎮延安卒諡忠獻又觀富鄭公作范文正公墓志云仲淹父名墉為錢俶掌書記仲淹二嵗而孤隨妣陳氏再適朱氏則雍豈仲淹之父乎相傳不考之誤至此世系且不明則史之善惡是非顛倒多矣張唐英范公傳元昊叛公兼領延安軍賊聞之第戒曰無以延州為念今小范老子腹中自有數萬兵甲不比大范老子可欺戎人呼知州為老子大范謂范雍也宋史不載此事亦無注續通鑑節要注云小范即仲淹大范指雍也本自明白乃以注謂大范名雍仲淹之父極詆史家之誤何耶仲淹范雍志云雍其先太原人曽祖其後唐初為校書郎從孟知祥入蜀為相祖某仕蜀為刑部侍郎入宋後𦵏河南遂為河南人宋史雍家世太原曽祖仁恕祖從龜又云慶厯六年禮部尚書知河南府兼西京留守司范公薨𦵏于洛陽某里附先塋也云鎮延安卒誤此不言太原河南止云蜀人豈李白彰明意耶富弼仲淹志云淹父墉妣陳氏謝氏范年譜公二嵗而孤夫人謝氏再適長山朱氏家録云幼隨母適朱氏名說二十三嵗詢知為范氏子感泣去之南都謝夫人亟使人追之既及公語之故期十年登第來迎親褒賢碑云妣謝氏為吳國夫人此止云陳不及謝正母何耶宋統似晉世云三代而下天下一統者漢唐宋而已余謂漢唐可稱一統宋僅與晉比耳不得並漢唐也當時有人問邵堯夫國祚不答架上取晉紀示之徽欽之事正符懷愍是宋之擬晉邵子固有說矣邵康節至京師士人多謁之請問休咎有一人獨問國家運數先生甚喜稱嘆再三謂之曰予某日歸子可與某處相候至期其人往候先生緘封文字一卷授之曰勿即觀俟至家發之視畢焚却一人奉教歸而發視則五代史晉出帝紀也曽三異因話録徽欽事與石晉出帝正符謂為懷愍邵子意耶天闚象緯逼杜工部龍門奉先寺詩天闚象緯逼或作天閱殊為牽强章表臣詩話據舊本作天闚引史記以管闚天之語其見卓矣余又按文選潘岳秋興賦闚天文之秘奥注引陸賈新語楚王作乾谿之臺闚天文杜子美熟精文選者也其用天闚字正本此况天文即象緯也不但用其字亦用其義矣子美復生必以余為知言也闚天文之秘奥閑居賦語亦非秋興賦也張表臣珊瑚鈎詩話云杜游龍門奉先寺云天闗象緯逼雲卧衣裳冷予曰星河垂地空翠濕衣非如所引云云也西清詩話云杜宿龍門詩天闕字荆公云當作閱然韋述東都記龍門號雙闕以與大内對峙若天闕焉此宿龍門詩也用闕字何疑庚溪詩話云韋述云云後人謂其屬對不切改為天闗王介甫改為天閱蔡興宗又謂世傳古本作天闚用莊子以管闚天為證皆臆說也且天闕云云冷此寺中即事耳以彼天闕之髙則勢逼象緯以我雲卧之幽則冷侵衣裳語自渾成道山清話云杜詩天闕荆公改為閱黄魯直對衆極言其是劉貢父曰直是怕他文貍楚辭九歌乗赤豹兮載文貍王逸注云神貍而不言其狀按山海經亶爰之山有獸焉狀如貍而有髦其名曰類自為牡牝余在大理嘗見之其狀如貍其文如豹土人名曰香髦疑即此物也星家衍心星為狐二十八宿真形圖心星有牡牝兩體其王逸所謂神貍之說乎九歌注王逸無神貍字前既引類後又引心星為狐一物而能兼三信神貍哉宋史崔鶠傳云傳曰謂狐為狸非但不知狐又不知狸其是之謂乎孟浪之言孟字當音夢分韻當與夢同而今乃與漾同韻非也余前録已引淮南子正月之孟陽氣始動為證以辨其非近觀莊子孟浪之言古本作􅎺字从亡从皿音莫浪切則孟與􅎺本二字不可混為一也􅎺浪之􅎺當在漾部而孟仲之孟自在送韻何疑焉莊子齊物云夫子以為孟浪之言而我以為妙道之行也注孟如字或武塟反向云孟浪音漫瀾無所取舍之謂今云古本作􅎺字豈莊手書耶說文􅎺血也從血亡聲左傳士刲羊亦無􅎺也在陽韻音荒玉篇韻㑹並無仄音孟出敬韻謂與夢同當在送韻與漾韻俱誤軼與轍同古字軼與轍同莊子夫子奔軼絶塵而囘瞠乎其後今謬讀軼作逸遂失其義戰國䇿主者循軼之途注軼轍同車迹也莊子田子方篇云奔逸絶塵無軼字國䇿聶政姊嫈曰軼奔育髙成荆注車相過也史記其軼乃時時見於他說索隠曰散軼也字書曰軼侵也突也跳也安得為轍字乎貌字音墨莊子人貌而天史記郭解賛人貌榮名唐楊妃傳命工貌妃於别殿皆作入聲讀杜詩畫工如山貌不同又曽貌先帝照夜白又屢貌尋常行路人梅聖俞詩妙娥貌玉輕邯鄲自注音墨田子方篇注云雖貌與人同而獨任自然史游俠傳云諺云人貌榮名豈有既乎徐廣云人以顔狀為貌者則貌有衰落矣惟用榮名為飾表則稱譽無極也二書俱無入音陽溝荀子入其央瀆注中瀆也今人家出水溝則如今稱出水竇曰央溝亦有本也太平御覽引莊子逸篇羊溝之鷄稱羊溝不知何解俗作陽溝云對隂溝之稱但未見所出耳莊子注羊溝鬭鷄處中華古今注羊喜觝觸垣牆為溝以隔之故曰羊溝郭璞爾雅注陽溝巨鶤古之名鷄須臾儀禮聘禮速賔辭曰寡君有不腆之酒請吾子與寡君須臾焉注須臾言不敢久古者樂不踰辰燕不移漏故少頃之間皆稱須㬰須待也左傳寡君須矣是也臾字從申從乙乙屈也如今人請客云恭俟屈降之義今之所云俟屈古之所云須臾也解字必宜如此方暢本原本註自明後之云云請自解之帆颿曹真有馬號驚帆言馳驟如風帆也俗遂制颿字音義與帆同然亦贅矣颿字見說文馬部徐鉉等曰舟船之颿本用此颿字今别作帆此云俗制豈叔重在曹真後耶又博雅颿颿走也韓文祥飊送颿更贅哉卾字从卩文選笛賦不占成節卾注卾直也从邑者乃地名也非此所施也據此則節卾連綿字皆从卩而今刻本皆誤从阝今選注無從邑下三句豈所引古本耶欵冬花欵冬花即爾雅所稱莬奚顆凍者紫赤華生水中十二月雪中出花郭縁生述征記云落水至冬凝厲則欵冬茂悅曽冰之中傅咸欵冬賦序曰余曽逐禽登於此山於時仲冬冰凌盈谷積雪被崖觀見欵冬曄然始敷佛經云朱炎鑠石不靡蕭邱之木凝冰慘慄不彫欵冬之花乃知唐詩僧房逢著欵冬花正十二街頭春雪是也詩人之興於時物如此抱朴子廣譬篇云凝冰慘慄而不能彫欵冬之花朱颷鑠石而不能靡蕭邱之木此云佛經是何卷中語蓋知辨正耳盧睪吳起云夏桀之國盧睪在其北伊洛出其南注云盧睪地缺慎按北方謂水黒曰盧睪即古臯字盧睪即盧溝也溝與臯音相近桀都安邑盧溝正在其北盧睪盧龍皆北方水名又湛盧劍名言湛然如水黒也盧橘亦以黒色名之可以互證史記起傳左河濟右太華伊闕在其南羊腸在其北通鑑綱目併因之則國䇿所謂盧睪者或其異名或是字訛耳若云盧溝正在安邑北則盧溝在燕安邑晉地與太華河濟綿邈無干若謂盧為黒即以盧溝當之國䇿補註盧一作廬將復何解耶且以睪為臯謂與溝音相近更為牽强荀子代睪而食注睪當為澤澤蘭也俗書澤字並水傍睪傳寫誤也又云睪芷養鼻韻㑹澤亦作睪說文睪伺視也从横目从羍音與逸同家語望其廣睪如也注髙也列子睪如音臯荀子臯如注當為宰又睪牢天下新序作宰牢汲冢古文云太康居斟尋羿亦居之桀又居之括地志故鄒城在洛州鞏縣西南五十八里蓋桀所居也是桀非都安邑矣安邑平陽晉陽禹所都也嫦娥月中嫦娥其說始于淮南及張衡靈憲其實因常儀占月而誤也古者羲和占日常儀占月皆官名也見于呂氏春秋春秋左傳有常儀靡即常儀氏之後也後訛為嫦娥以儀娥音同耳周禮注儀義二字古皆音俄易小象以失其義叶凶如何也詩以樂且有儀叶在彼中阿太𤣥以各遵其儀叶不偏不頗史記徐廣注音檥船作俄漢碑凡蓼莪皆作蓼儀則嫦娥為常儀之誤無疑矣每以語人或猶未信予曰小說載杭州有杜拾遺廟有村學究題為杜十姨遂作女像以配劉伶人皆知笑之不知常儀之為嫦娥即拾遺之為十姨也此學齋佔畢緒論耳周禮註以下見洪景伯𨽻什席上腐談云温州有土地杜十姨無夫五撮鬚相公無婦州人迎杜十姨以配伍撮鬚合為一廟問杜十姨為誰曰杜拾遺也五撮鬚為誰曰伍子胥也少陵有靈必對子胥笑曰爾尚有相公之稱我乃為十姨豈不雌我耶云杭州劉伶恐别有見歸藏云常娥奔月是為月精非始淮南也淮南註云奔月或作坌肉藥以為死畜之肉可復生也麟按史氏之說得之而未盡山海經云常羲帝俊妻生月十有二月中嫦娥其誤當始此山海經之謬則本之常儀淮南之謬又本之山海非常儀占月則常羲生月之說無由附㑹也非常羲為帝俊妻則嫦娥為羿妻無由附㑹也胡氏筆叢常呂作尚晦伯謂歸藏有嫦娥之說此不足憑歸藏六朝偽書蓋又竊淮南之說因此益見歸藏為偽書也上連山歸藏據孔安國語周末已亡用修所引連山藏于蘭臺歸藏藏于太卜乃桓君山眯論或東漢人偽作者耳用修何遽信之上考隋志有歸藏二卷稱子夏傳或以為杜鄴子夏非卜商也按鄴西漢末人與杜欽同時俱字子夏君山所謂歸藏必鄴所撰東京收合新莽燼餘誤其字為卜商故太卜藏之而桓不考耳上隋志歸藏十三卷晉太尉參軍薛貞注不云子夏按歸藏之書大明迂怪乃稱羿斃十日姮娥奔月殷湯如茲况諸子乎梁劉勰文心雕龍劉非六朝人耶一隂符耳用修俄以為六代俄以為唐人又俄以為後漢何無定見如此筆叢胡駁楊辨矣乃歸藏既以為六朝又以為東漢又以為西漢末將無同於楊耶孔安國書序亦無周末已亡之語丁字有尾水經注載齊地掘得古塚棺前和有八分書驗文乃太公三世孫胡公之墓以此知八分書不始於秦矣余又按莊子云丁子有尾李頤注云丁字書冩皆作右波故曰有尾此又一證也莊子丁子有尾李注云夫萬物無定形形無定稱在上為首在下為尾世人謂右行曲波為尾今丁子二字雖左行曲波亦是尾也莊注若此豈可刪其半以適巳用乎聾蟲淮南子云馬聾蟲也而可以通氣志猶待教而成况人乎注聾蟲喻無知聾蟲之名甚竒此容齋四筆說也又說林云狂馬不觸木猘犬不投於河雖聾蟲而不自陷又况人乎文子云聾蟲雖愚不害其所愛注鱉聾無耳據此二說可專以名馬而竒之乎容齋失考於前子復承誤於後何耶真珠船王應麟嘗言得一異事如獲一真珠船王徽之云讀書每得一義如得一真珠船見陸農師詩註鮑姑艾世傳鮑姑艾五月五日曽灼龍女鮑姑亦仙女流也宋人五日帖子中有用此事者續録裴鉶傳竒云貞元中有崔煒者中元日在番禺開元寺脫一老嫗之難異日嫗以越井崗艾奉之曰可愈疣贅兼獲美艷煒後誤墜穴中見大白蛇有疣灸之應手墮地遂跨蛇行至一洞府有小青衣云玉京子送崔家郎君至矣須臾有四女酌醴侍之及出四女云中元日吾輩當送田夫人往也知有鮑姑艾可留少許如期果至乃知向入尉佗墓耳遂以為室因問鮑姑何人曰鮑靚女葛洪妻也何以呼蛇為玉京子曰安期生嘗跨斯龍朝玉京耳此云五日灼龍女當别有見古碑有神物䕶持唐李邕書雲麾將軍碑已斷裂在蒲城縣正德中劉逺夫御史謫為蒲城簿訪出以鐵束錮之復為完物饒州薦福寺碑為雷所驚而碎近日好古者取其碎裂合而卧樹之猶可摹印簡西嶨為予言親見許予摹寄一本尚未獲也以二事占之古碑似有神物䕶持金石録云雲麾將軍李琇碑李邕撰并行書天寶元年正月立蒲城或當有之不敢强所不知其薦福寺則余與姚江張汝宗岳所同游者訪碑遺址若罔聞知稽之郡志文亦不載而其說若此宋王明清玉照新志云雷轟薦福碑事見楚僧惠洪冷齋夜話頃嵗婁彦發機自饒州通判歸詢之云薦福寺雖號鄱陽巨刹元無此碑乃惠洪偽為是說也太白清平樂辭以下詞品李太白應制清平樂辭云禁庭春晝鶯羽披新繡百草巧求花下鬭只賭珠璣滿斗日晩却理殘妝御前閒舞霓裳誰道腰支窈窕折旋消得君王其二云禁幃秋月夜探金窓罅玉帳鴛鴦噴蘭麝時落銀燈香灺女伴莫話孤眠六宫羅綺三千一笑皆生百媚宸遊教在誰邊此辭見呂鵬遏雲集載四首黄玉林以其二首無清逸氣韻止選二首慎嘗補作二首李濬松窓雜録云開元中禁中初重木芍藥得四本移植於沉香亭前㑹花方繁開上乗照夜白太真妃以步輦從李龜年前欲歌之上曰賞名花對妃子何用舊詞為命龜年宣李白進清平調詞三章白宿酲未解因援筆賦云雲想衣裳花想容春風拂曉露華濃若非羣玉山頭見㑹向瑶㙜月下逢一枝紅艷露凝香雲雨巫山枉斷腸借問漢宫誰得似可憐飛燕倚新粧名花傾國兩相歡常得君王帶笑看解釋春風無限恨沉香亭北倚闌干龜年遽以詞進上促龜年歌之仍自調玉笛倚曲以媚妃自是顧白尤異於他學士張君房脞說指此三首為清平樂曲尊前集及樂府詩集止曰清平調今據所引復有四首不知當是何時所進且其詞全不類謫仙語豈呂鵬輩羼入者耶菩薩鬘西域諸國婦女編髮垂髻飾以雜華如中國塑佛像瓔珞之飾曰菩薩鬘曲名取此杜陽雜編云大中初女蠻國貢雙龍犀明霞錦其國人危髻金冠瓔珞被體故謂之菩薩蠻當時倡優遂製菩薩蠻曲文士亦往往聲其詞南部新書亦載北夢瑣言云宣宗愛唱菩薩蠻詞令狐相國假温飛卿新撰宻進之戒以勿泄而遽言於人由是疎之如夢令唐莊宗辭云曽宴桃源深洞一曲舞鸞歌鳯長記别伊時和淚出門相送如夢如夢殘月落花烟重此莊宗自度曲也樂府取辭中如夢二字名曲今誤傳為呂洞賓非也古今詞話云後唐莊宗修内苑掘得斷碑中有三十二字云云莊宗使樂工入律歌之名曰古記又使翰林作數篇翰府名談云李白過潼闗詞一名宴桃源東坡云莊宗製名嫌其不馴雅改為如夢蓋其中有如夢如夢句也鬼仙詞曉星明滅白露㸃秋風落葉故址頽垣冷烟衰草前朝宫闕長安道上行客依舊利深名切改變容顔消磨今古隴頭殘月此五代新說載鬼仙辭也非太白長吉之流豈能及此古今詞話云蜀州王守有門下客遇紅梅花作祟贈栁梢青詞云依稀曉星云云若是鬼謡則小說有之倘或人作此詞以詭世其人亦必為鬼録矣蓋其意皆幽隂中不祥語也五代新說唐髙宗咸寧中張詢古所撰載梁陳北齊周隋君臣雜事也時白賀尚未生豈謂前生之鬼耶蓋止知梁唐晉漢周為五代耳盧絳盧絳南唐人夢一婦人歌菩薩蠻云玉京人去秋蕭索畫簷雀起梧桐落欹枕悄無言月和清夢圓背燈惟暗泣甚處砧聲急眉黛小山攢芭蕉生暮寒其應不著辭頗清潤特録之絳事見馬令南唐書本傳末句作獨自倚闌干衣襟生暮寒云龍衮江南野史云盧絳病困忽夢一白衣婦人教之食蔗而愈迨數夕又夢前婦人云妾乃玉真也太尉富貴時至可詣都城妾有一詩一緡以助行旅十年之後當於孟家陂上奉見歌其詞云清風良月夜深時箕箒盧郎恨尚遲他日孟家陂上約再來相見是佳期言訖而去絳驚覺果獲其緡由是自負入金陵畫䇿詣後主累官柱國唐亡歸宋以龔慎儀事坐誅既出乃呼延贊當視行事將至梁門絳遂顧見擁一白衣婦人來宛同昔日夢中因嗟曰玉真矣何至於此乎贊問其故絳乃白其夢絳復問孟家陂持刃者曰斯塲是矣因數指迨今十年歎曰昔日之夢今果驗矣死復何恨玉真姓耿氏其夫死與前婦之子通當坐法與絳同塲斬焉此事與南唐書同但以詞作詩為稍異耳因詳出之法曲獻仙音望江南即唐法曲獻仙音也但法曲凡三疊望江南止兩疊耳白樂天改法曲為憶江南其辭云江南好風景舊曽諳二疊云江南憶最憶是杭州三疊云江南憶其次憶吳宫南宋紹興中杭都酒肆中有道人攜烏衣椎髻女子買斗酒獨飲女子歌以侑之歌辭非人世語或記之以問一道士道士曰此赤城韓夫人作法駕導引也烏衣女子蓋龍云其辭曰朝元路朝元路同駕玉華君千乗載花紅一色人間遙指是祥雲迴望海光新二疊云東風起東風起海上百花揺十八風鬟雲半動飛花和雨著輕綃歸路碧迢迢三疊云簾漠漠簾漠漠天淡一簾秋自洗玉舟著白酒月華微映是空舟歌罷海西流此辭即法曲之腔文士好竒故神其事以傳耳豈有天仙而反取開元人間之腔乎陳去非云世傳頃年都下肆中有道人攜烏衣椎髻女子買㪷酒獨飲女子歌詞凡九闋皆非人世語或記之以問一道士道士驚曰此赤城韓夫人所製水府蔡真君法駕導引也烏衣女子疑龍云得其三而亡其六擬作三闋云云曽慥樂府雅詞段安節樂府雜録云望江南者因朱崖李太尉鎮浙西日為亡姬謝秋娘所撰本名謝秋娘後進入教坊遂改此名一名夢江南曲也王灼碧鷄漫志云白樂天作憶江南三首自注云此曲一名謝秋娘后人又取樂天首句名江南好唐法曲獻仙音在宋已無知者歐陽永叔及沈存中等皆止稱遺聲云云詳見碧鷄漫志今輒指為望江南恐未然劉禹錫憶江南止二疊見樂府詩集周美成栁耆卿有法曲獻仙音辭俱長調也朱淑真元夕辭朱淑真元夕生查子云去年元夜時花市燈如晝月上栁梢頭人約黄昏後今年元夜時月與燈依舊不見去年人淚濕春羅衫袖辭則佳矣豈良人家婦所宜耶其行可知此永叔辭也或云少游指為淑真不重誣人耶白團扇歌晉中書令王珉與嫂婢謝芳姿有情愛捉白團扇與之樂府遂有白團扇歌云白團扇憔悴無復理羞與郎相見其本詞云犢車薄不乗步行躍玉顔逢儂都共語起欲著夜半其二云團扇薄不搖窈窕搖蒲葵相憐中道罷定是阿誰非其三云御路薄不行窈窕穿迴塘團扇障白日面作芙蓉光其四云白錦薄不著趣行著練衣異色都言好清白為誰施薄如唐書薄天子不為之薄芳姿之才如此而屈為人婢信乎佳人薄命矣元闗漢卿嘗見一從嫁媵婢作一小令云髩鴉臉霞云云辭欠雅畧之事亦相類而可笑併附于此古今樂録云晉中書令王珉捉白團扇與嫂婢謝芳姿有愛情好甚篤嫂捶撻婢過苦王東亭聞而止之芳姿素善歌嫂令歌一曲當赦之應聲歌曰白團扇辛苦五留連是郎眼所見珉聞更問之汝歌何遺芳姿即改云白團扇憔悴非昔容羞與郎相見後人因而歌之詞凡六首無名氏見樂府詩集文獻通考云婢素好歌而珉好持白扇故云髩雅臉霞云云周德清書所見朝天子辭也見楊朝英太平樂府楊栁枝詞周德華劉采春女清江一曲栁千條二十年前舊板橋曽與情人橋上别更無消息到今朝唐絶増竒神品雲溪友議云裴諴郎中晉國公次子也足情調善談諧與舉子温岐為友俱善歌曲迄今飲席多是其詞有德華周氏者劉採春女也雖羅嗊之歌不及其母而楊栁之辭採春難及湖州崔芻言郎中將至京洛豪門女弟子多從之學温裴所稱歌曲請德華一陳音韻德華終不取焉二公皆有愧色所唱者七八篇皆近名流之詠也劉禹錫尚書一首春江一曲云云今直指為德華誤廣文選近閱廣文選宋玉微詠賦乃誤王為玉而題云微詠賦下書宋玉之名不知王微乃南宋人史具有姓名而疎謬如此殊誤觀者微詠賦陳子同俌文選補遺已載之矣王微本傳不云有詠賦之作豈當别有見耶蘘荷子丘文莊公羣書抄方載中毒用白蘘荷引栁子厚詩云云且曰子厚在栁州種之其地必有此種仕於兹土者其物色之蓋亦不知爲何物也余謂丘公之博洽而不識世之識者亦罕矣按松江志引急就章注曰白蘘荷即今甘露考之本草其形性正同急就章云老菁蘘荷冬日藏顔師古注蘘荷一名蓴苴莖葉似薑其根香而脆可以為葅又辟蠱毒本草云葉似初生甘蕉根似薑芽性好隂在木下生者尤美中蠱者服其汁卧其葉即呼蠱主姓名周禮庶氏以嘉草除蠱毒宗懍謂嘉草即此也栁種白蘘荷詩庶氏有嘉草攻禬事久冺注引本草說文一名葍蒩古今注紫者曰葍蒩白者曰蘘荷解毒用白蘘荷陶隠居葍作覆史記相如上林賦紫薑蘘荷正義曰柯根旁生笋若芙蓉可以為葅又治蠱毒也後漢馬融廣成頌芝荋菫荁蘘荷芋渠章懷注曰蘘荷苗似薑根花紅紫似芙蓉可食潘安仁閒居賦蘘荷宜隂時藿向陽干寶搜神記云蔣士先得疾下血言中蠱家人宻以蘘荷置其席下忽大笑曰蠱我者張小也乃收小小走自此解毒藥多用之按諸說明甚且今蘘荷與甘露枝葉迥别乃云考之本草其形性正同又古本耶文莊抄方余未及見或疑殆意也松志謂俗呼甘露子根如蚕蛹莖葉如薄荷云云乃引急就章亦誤君遷樹文選蜀都賦平仲君遷皆木名注缺按司馬公名苑云君遷子如馬妳俗云牛妳柿是也今之造扇用此柿油可補文選註吳都賦平仲君遷松梓古度注劉成云平仲之木實白如銀君遷之樹子如瓠形云蜀都注缺誤魏王花木志君遷樹細似甘蕉子如馬乳交州記君遷子實中有乳汁甜美香好主消渴煩熱鎮心久服輕身亦得悅人顔色本草君遷生海南樹髙丈餘中有汁如乳汁吳都賦平仲君遷圖經云有一種小柿謂之軟棗俚俗暴乾貨之謂之牛妳柿據此諸說可補選注耶均即韵唐書樂志古無韵字均即韵也五帝之學曰成均均亦音韵書曰命汝典樂敎胄子論語曰成於樂是成均之說也周人立大學兼五帝及二代之名東學為東序西學為瞽宗北學為上庠南學為成均宜學言語者處之成均則均之為韵義益明矣潘安仁笙賦音均不恒曲無定制注均古韵字鶡冠子五音不同均然其可喜一也唐書李綱傳引周禮均工樂胥不得列於士伍唐書樂志開元用祖孝孫十二和十曰休和皆以其月之律均又貞元中韋臯作南詔奉聖樂用黄鍾之均又為五均髙宗時呂才上言舜彈五絃之琴歌南風之詩今以御雪詩為白雪歌以羣臣所和詩十六韻為送聲十六節帝善之都無古無韵字均即韵也之說旋宫以七聲為均均言韻也古無韻字猶言一韻聲也楊收傳說文均平徧也從土均聲韻和也從音貟單出為聲成文為音音貟為韻說文在唐志之後乎禮文王世子郊人逺之於成均以及取爵於上尊也注董仲舒曰五帝名大學曰成均則虞庠近是也疏云以無正文故云近是仲舒去古未逺不能定其名今復千載餘矣乃為指其事竒哉禮大司樂掌成均之法以治建國之學政而合國之子弟有道有德者使教焉以樂德中和祗庸孝友樂語興道諷誦言語樂舞雲門大卷咸㲈夏濩武今專以學言語者處之得乎易氏曰成者成其行之虧均者均其習之偏五帝即此以名學成周因之以為教書帝曰䕫命汝典樂教胄子直而温寛而栗剛而無虐云云豈直教韻乎大戴禮保傅篇云帝入東學尚親而貴仁入南學上齒而貴信入西學上賢而貴德入北學上貴而尊爵注四學者東序瞽宗虞庠及四郊之學也易傳太初篇云天子旦入東學晝入南學夕入西學暮入北學在中央曰太學天子所自學也成公綏嘯賦音均不恒曲無定制善注引鶡冠子云云五臣作韻謂笙賦誤笙賦基黄鍾以舉韻望儀鳯以擢形不作均字周國語伶州鳩曰律所以立均出度也韋昭曰均者均鐘木長七尺有弦擊之以均鐘者又云度律均鐘百官軌儀注平也夏小正云農率均田疏均田則審端徑遂也易豐卦雖旬无咎荀本作均周禮均人公旬用三日注旬古均字書厥罪惟鈞左傳年鈞以德禮内則旬而見注當為均亦可謂為韵字乎古字簡少相近者多假借用之如集古金石二録所載縣令為苓眉壽為麋職方為識蓼莪為儀鄧艾為義之類不能盡書若必欲以均為韵則前之諸字又將何解耶水龍墐戸録隋梁睿請伐陳文帝答詔曰陳國來朝未盡臣節誠須有罪必興師旅若命水龍終當相屈昔人謂戰艦曰水龍水龍乃永襲字也兩山墨談既誤於前矣公録於冊豈容再誤耶隋書云睿上平陳之䇿上善之下詔曰公既上才若總戎律一舉大定固在不疑但朕初臨天下政道未洽恐先窮武事未盡善昔公孫述隗囂漢之賊也光武與其通和稱為皇帝尉佗之於髙祖初猶不臣孫皓之答晉文書尚云白或尋款服或即滅亡王者體大義存遵養雖陳國來朝未盡藩節如公大畧誠須責罪尚欲且緩其誅宜知此意淮海未滅必興師旅若命永襲終當相屈想以身許國無足致辭也睿乃止焉北史同晉書孫皓天紀中童謡曰阿童復阿童銜刀浮渡江不畏岸上虎但畏水中龍羊祜聞之曰此必水軍有功又王濬小字阿童乃表武帝加龍驤將軍及征吳江西衆軍無過者而濬先定秣陵五行志及祜傳此雖有水中龍字亦非戰艦也鱮異魚圖贊緡調餌芳可獲鱮魚網魚得鱮不如噉茹或名曰鱅其性慵如說苑子賤語又古諺云云説苑政理篇宓子賤將適單父陽晝曰吾少賤無以送子有釣道二焉夫投綸錯餌迎而吸之者陽橋也其為魚薄而不美若亡若存若食若不食者魴也其為魚也博而厚味子賤曰善云云選應休璉書陽晝喻於詹何注引說苑橋作鱎俱無鱮字亦非子賤語也餘里語見詩疏埤雅鯤上鯤本魚子細如蠶茸莊周寓言鯤化為鵬譬彼詩頌雕育桃蟲千古言詮誰發其矇注莊子云北溟有魚其名為鯤鯤之大不知其幾萬里此寓言也按内則卵醤卵音鯤國語曰無禁鯤鮞皆以鯤為魚子至小之物也莊子乃以至小為至大便是滑稽之開端後人皆不得其言詮雖郭象之𤣥奥沉思亦誤况司馬彪輩乎余嘗謂天地乃一大戲塲堯舜為古今正生桀紂為古今大丑莊列為古今大淨千載而下不得其解皆矮人觀塲也莊注云鵬鯤之實吾所未詳也夫莊子之大意在乎逍遥游放無為而自得故極小大之致以明性分之適達觀之士宜要其㑹歸而遺其所寄不足事事曲與生說自不害其𢎞㫖皆可畧之此解明甚公云言詮得非子𤣥誤合者耶世說向秀注莊妙析𤣥致秀卒子幼義遂零落然猶有别本郭象者為人薄行有儁才見秀義不傳于世遂竊以為巳註惟自注秋水至樂二篇據此則莊非象注矣竊注見譏於義慶誤註追誚於用修子𤣥厄哉晏子春秋載橘枳狗門之說史滑稽傳紀叔敖葬馬之辭乃云滑稽開端豈周在楚莊齊景前耶天地戲塲云云非聖不道姑無論矣但公品詞製曲自等周郎者其生丑淨字名義如太和正音等所載是如此解耶太白詩太白哭宣城紀叟詩紀叟黄泉裏還應釀老春夜臺無曉日沽酒與何人古本作夜臺無李白絶妙不但齊一生死又且雄視幽明矣昧者改為夜臺無曉日夜臺自無曉日且與下句何人字不相應甚矣士俗不可醫也詩有本明淺而故欲其髙深此是文人一病如太白哭紀叟詩紀叟黄云云何人本自明白沈痛而楊用脩云古本云云夫此詩為哭紀叟亦寓調謔意正是曠達處黄泉釀酒豈真如地獄六街三市耶白意蓋謂紀叟生前善釀即在黄泉還應不忘本業但夜臺茫茫無有曉日沽酒與何人耶可謂至痛今云夜臺自無曉日此自不嫌于複也予不暇逺引如謝靈運谷幽光未顯亦可謂幽谷自無顯光陸士衡明月一何朗亦可謂明月本自朗詩家如此類甚多也且夜臺無李白以見在之身而言則誠妙若究竟言之李白能不入夜臺耶果騎鯨上天耶反與沽酒與何人之句不應矣乃笑士俗不可醫予不知其何說也王𦙍昌李集分註又載題戴老酒店云戴老黄泉下還應醉大春夜臺無李白沽酒與何人按此具載本集乃云古本何耶􅟯與涴同韋莊應天長詞云想得此時情切淚沾紅袖􅟯􅟯字義與涴同而字則讀如涴字入聲始得其叶然說文玉篇俱無􅟯字惟元詞中馬驟􅟯人語喧北音作平聲四轉作入聲正叶花間集云淚沾紅袖黦不作􅟯字或所見别本之誤耳􅟯字書音流與涴義不相蒙乃苦欲轉作涴讀何耶龍生九子俗傳龍生九子不成龍各有所好𢎞治中孝廟御書小帖以問内閣李文正東陽具疏以對據圭峯羅玘蘆泉劉績之言承上問而不蔽下臣之美賢相之盛節也文正嘗為慎言今影響記之録于此一曰贔屭形似龜好負重今石碑下龜趺是也二曰螭吻形似獸性好望今屋上獸頭是也三曰蒲牢形似龍而小性好叫吼今鐘上紐是也四曰狴犴形似虎有威力故立於獄門五曰饕餮好飲食故立於鼎蓋六曰􅪆􅫔性好水故立於橋柱七曰睚眦性好殺故立於刀環八曰金猊形似獅性好烟火故立於香鑪九曰椒圖形似螺蚌性好閉故立於門鋪首又有金吾形似美人首尾似魚有兩翼其性通靈不寐故用警巡巵言按爾雅九種龍其名曰蒲牢囚牛蚩吻嘲風贔屓霸下狴犴狻猊睚眦贔屓好文云云總龜對類近峯聞畧云龍生九子見爾雅西涯公紀桂岥遇録所解甚悉予又觀他說間有同異殆必有所據也吳郡皇甫録夫爾雅者興于中古隆于漢氏列在十三經中非僻書也其釋獸中止有狻猊郭璞注云即獅子併無别項龍子之說且埤雅雅翼並號該綜亦絶無一言及之者對類云云得無虚搆偽辭如雲仙散録等書類耶菽園雜記古諸器物異名屭贔其形似龜云云出山海經博物志嘗過倪村民家見其雜録中有此然考山海經博物志皆無之山海原缺第十四十五卷聞博物志自有全本與今書坊本不同豈記此者嘗得見其全書歟吳郡陸文量夫山海記于伯益博物志于張華方其未缺之時漢晉以來并不見于引證獨倪村民家乃得見其全書陸公無乃亦失於折衷乎唐趙耕龍公碑云張路斯潁上人隋初明經登第景龍中為宣城令夫人闗州石氏生九子自宣城罷歸每夕出自戌至丑歸輒體寒而濕石氏異之問其故曰我龍也蓼人鄭祥逺亦龍也騎白牛據吾池自謂鄭公池吾屢與戰未勝明日取決可令吾子射以助我係鬛以青綃者鄭也絳綃者吾也明日九子遂射青綃者中之鄭怒東北去投合肥西山以死今龍穴山是也公與九子皆化為龍歐陽修集古録蘇軾碑隂按龍生九子蓋此事也大臣不學小臣妄對其誤一耳公復筆之以誇人豈容再誤乎胡侍真珠船云𢎞治間泰陵令中官問龍生九子名目於李少師東陽李不能悉詢于吏部劉員外績乃得其說於故册面上所録然亦不知所從出因據以復余憶十一二時曽見其說於對類總龜中近因厯考傳記乃知其說為不經其辨甚詳然亦不及于此因附載之陳晦伯攷龍生九子事詳矣猶覺一事未及引後漢書哀牢夷有婦人名沙壹捕魚水中觸沉木有感産子男十人後沉木化為龍出水上曰若為我生子何在九子見龍驚走獨小子不能去背龍而坐龍因䑛之其母鳥語謂背為九謂坐為隆因名子曰九隆諸兄推以為王後牢山下有一夫一婦復生十女九隆兄弟皆娶為妻据此亦龍生九子一證也於碝注筆按本傳名子為九隆及後長大諸兄以九隆為父所舐而黠遂共推以為王夫曰小子曰諸兄則九隆第十子也謂背為九則九非數也謂坐為隆則非即龍也云未及引為證似猶未審興渠禪林阿魏藥也一云興渠方蘆菔根未出土臭氣聞于逺近葷而非辛阿魏是也辛而非葷薑芥是也是葷復是辛五辛是也梵網經云五辛者一葱二薤三韭四蒜五興渠翻譯名義釋慧日云僧徒多迷五辛中興渠或云蕓薹胡荽或云阿魏唯淨土集云五辛此土有四闕於興渠梵語稍訛正云形具餘國不見迴至于闐方得見也根麄如細蔓菁根而白其臭如蒜彼國人種取根食也于時冬天到彼不見枝葉薹荽非五辛所食無罪日親見為驗唐髙僧傳正楊卷四
