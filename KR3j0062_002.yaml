body:
  text: 正楊卷二明陳耀文撰方城本萬城左傳方城以為城古本方本萬字古字萬亦作万故訛爾唐勒奏土論曰我是楚也世伯南土自越以至葉垂𢎞境萬里故曰萬城也水經注春秋昭公十五年許遷於葉楚盛周衰控霸南土欲爭強中國多築列城於北方以逼華夏故號此城為萬城或作方字唐勒奏土論曰我是楚也世霸南土自越以至葉垂𢎞境萬里號曰萬城也余按屈完之在召陵對齊侯曰楚國方城以為城杜預曰方城山名也在葉南未詳孰是左僖公四年齊侯伐楚楚子使屈完如師師退次於召陵齊侯陳諸侯之師與屈完乘而觀之屈完曰君若以力楚國方城以為城漢水以為池雖衆無所用之服虔曰方城山在漢南左定公四年吳子伐楚自豫章與楚夾漢左司馬戍謂子常曰子沿漢而與之上下我悉方城外以毁其舟還塞大隧直轅置泥子濟漢而伐之我自後擊之必大敗之史記禮書楚汝潁以為險江漢以為池阻之以鄧林緣之以方城然而秦師至鄢郢舉若振稿是豈無固險阻哉其所以統之者非其道故也正義曰括地志云方城房州竹山縣東南四十一里其山頂上平四面險峻山南有城長十餘里名為方城即此山也史記楚世家成王初即位布德施惠結舊好於諸侯使人獻天子天子賜胙曰鎮爾南方夷越之亂無侵中國於是楚地千里十六年齊桓公以兵侵楚至陘山楚成王使將軍屈完以兵禦之蘇秦説楚威王曰楚天下之強國也地五千餘里帶甲百萬此霸王之資也國語曰桓公用管仲即位數年一戰帥服三十一國遂南征伐楚濟汝踰方城望汶山管子霸形同汶音岷毛居正六經正誤云谷風蔓音萬作万非蓋万本音墨万侯姓也俗借作草書萬字經典豈應用之經典夫齊師至陘退次召陵潁川至葉相去無幾則服虔所謂方城在漢南者是也元凱似為少誤楚成王時越非楚屬威王強盛不過五千則自越至葉𢎞境萬里者非也道元亦失折衷然杜注之稱山名尚云可據酈氏之持兩端猶為愼密也今勦舊籍以自奓假古本以欺人何耶宋本文言曽得豐生於面覿左傳古本又對楊子於遺編故知蒸豚烹雞何代無賢十室之邑必有忠信者矣王元美云用修以方城為萬城其可笑不待言伯晦引史記阻之以鄧林緣之以方城又我悉方城外及服虔杜預之説以闢之似矣然不如盛𢎞之荆州記之明切也其云葉東界有故城始犨縣東至瀙水達泚陽界南北聯聯數百里號為方城一謂之長城南北雖無基築皆連山相接而漢水流其南故屈完云云何其易曉也郡國志葉縣有方城郭仲産曰苦萊于東俱有方城又楚狂接輿耕於方城之南蓋皆傍此長山方城而名者也按此所引荆州記云云俱見水經注潕水條下前不引之以正者蓋管國俱云踰方城望汶山是即所謂長江之險與我共之者矣則屈完所云方城為城其指漢南無疑故余謂元凱似為少誤是欲因楊以弼杜非引杜以闢楊也今述道元所載之説以為明切易曉而復錯綜其詞自見其博是又承杜之誤而蹈楊之轍矣孔子沐浴而朝孔子沐浴而朝於義盡矣胡氏乃云仲尼此舉先發後聞可也是病聖人之未盡也果如胡氏之言則不告於君而擅興甲兵是孔子先叛矣何以討人哉胡氏釋之於春秋朱子引之於論語皆未知此理也嶽飛承金牌之召或勸之勿班師飛曰此乃飛反非檜反也其從容君臣之義雖聖人不過是也春秋隱公四年夏宋公陳侯蔡人衛人伐鄭胡氏曰春秋之法誅首惡云云引陳恆云云不告也然則鄰有弒逆聲罪赴討雖先發而後聞可矣胡氏未嘗有仲尼此舉之言朱子誤引之耳奈何波及胡氏耶想亦未觀胡傳耳翠微爾雅山未及上曰翠微詩曰陟彼崔嵬崔嵬即翠微詩傳授字各不同爾然崔嵬字不及翠微之工凡山逺望則翠近之則翠漸微也故曰翠微也陸佐公石闕銘云旁映重疊上連翠微濟曰翠微天邊氣也爾雅云石山戴土謂之崔嵬使崔嵬即翠微爾雅何為重出耶筤蜀名竹藂曰林筤易説卦為蒼筤竹古注音浪字書云蒼筤幼竹又車籃也在陽字韻易注音郎今曰古注豈閣本耶雉噫楊子五百篇論孔子因女樂去魯曰不聽政諫不用雉噫注雉噫猶歌歎之聲梁鴻五噫之類也琴操曰季桓子受齊女樂又不致膰爼於大夫孔子遂行師已送之曰夫子則非罪也孔子曰吾歌可乎歌曰彼婦之口可以出走彼婦之謁可以死敗優哉遊哉聊以卒歲此即雉噫之歌也衝波傳云孔子相魯齊人懼而欲敗其政選齊國好女八十人皆衣文衣而舞容璣季桓子語魯君為周道遊館孔子乃行覩雉之飛鳴嘆曰山梁雌雉時哉時哉色斯舉矣翔而後集因為雉噫之歌曰彼婦之叩可以出奏彼婦之謁可以死北優哉遊哉聊以卒歲楊子所云雉噫者指此唐人學官碑文云聆鳯衰於南楚歌雉噫於東魯亦用楊子之語也今本無雉字故詳具之以廣異聞楊子雉噫司馬本無雉字又藝林伐山云楊子言孔子之去魯云云五噫之類也按家語孔子去魯歌曰彼婦云云聊以卒歲此即雉噫之歌也唐文聆鳯衰於接輿歌雉噫於桓子按此一事一曰家語一曰衝波傳一有論語一無之何自相矛盾也風雅逸篇衝波傳云有鳥九尾孔子與子夏見之人以問孔子曰鶬也子夏曰何以知之孔子曰河上之歌云鶬兮鴰兮逆毛衰兮一身九尾長兮韓詩內傳云孔子渡江見鶬鴰異之衆莫能名孔子嘗聞河上人歌云鴰兮鶻兮逆毛衰兮一身九尾長兮大戴禮注引韓詩內傳云鶬鴰胎生孔子渡江見而異之白澤圖云昔孔子子夏所見故歌之其頭九首今呼為九頭鳥也文選江賦龍鯉一角竒鶬九頭注劉騊駼玄根賦云一足之夔九頭之鶬酉陽雜俎云白澤圖謂之鶬鸆帝鵠書謂之逆鶬寶厯中國子四門助教史逈語段成式常見裴瑜所注爾雅言鶬糜鴰是九頭鳥也此數書俱不引衝波傳不知何從見之真竒聞也公冶長世傳公冶長能通鳥語不見於書惟唐沈佺期燕詩云不知黃雀語能免冶長災白樂天鳥鶴贈答詩序云豫非冶長不能通其意似實有其事或在亡逸書中如衝波傳魯定公記之類今無所考耳論語疏云公冶長辨鳥雀語云唶唶嘖嘖白蓮水邊有車覆粟車腳淪泥犢牛折角收之不盡相呼共啄人驗之果然邢昺云舊説冶長解鳥語故係之縲絏此既云如衝波傳之類無所於考則所引鶬鴰之歌及雉噫之歌皆云出衝波傳何耶王元美云諺有城門失火殃及池魚詩有舊時王謝堂前燕飛入尋常百姓家其事甚明而附會其説者至以池魚為姓名以王謝為商誤遊烏衣國又孔子謂公冶長在縲絏之中而小説謂公冶長識鳥語為鳥所誤至沈佺期引之入詩曰不知黃雀語能免冶長災皆可笑也解鳥語者公冶長見衝波傳又沈佺期詩不知黃雀語能免冶長災池魚王謝事前人已自有説但冶長縲絏既笑沈詩為附會而識鳥語復引衝波及沈詩實之一卷中前後不顧如此王楊殆二秦一律者矣扁舟本作鯿舟或問豫詩人多用扁舟何處為始豫按南史天淵地新製鯿魚舟形甚狹故小舟稱扁舟六朝詩惟王由禮有扁舟夜向江頭泊之句至唐人則多用之方望為隗囂軍師後囂不聽其言望以書謝之曰范蠡收責勾踐乘扁舟於五湖舅犯謝罪文公亦逡巡於河上望之無勞固其宜也望聞烏氏有龍池之山微徑南通與漢相屬其傍時有竒人聊及間暇廣求其真願將軍勉之望之見機亂邦托迹方外飄然行遁邈焉莫追賢於范增逺矣吳越春秋范蠡辭王乃乘扁舟出三江入五湖人莫知其所適史貨殖傳范蠡既雪會稽之恥乃乘扁舟浮于江湖漢書音義曰特舟也後漢書更始三年正月平陵人方望立前孺子劉嬰為天子望為丞相弓林為大司馬更始遣李松蘇茂等擊斬之所云扁舟為編舟矣又引方望書望豈在南朝後耶王元美引方望書末云雖鴟夷子皮何以加焉然至立劉林作天子自為丞相卒陷大戮死者有知能無為西川強鬼所笑以劉嬰弓林為一人誤西施世傳西施隨范蠡去不見所出只因杜牧西子下姑蘇一舸逐鴟夷之句而附會也豫竊疑之未有可證以折其是非一日讀墨子曰吳起之裂其功也西施之沉其美也喜曰此吳亡之後西施亦死於水不從范蠡去之一證墨子去吳越之世甚近所書得其真然猶恐牧之别有見後檢修文御覽見引吳越春秋逸篇云吳亡後越浮西施於江令隨鴟夷以終乃嗟曰此事正與墨子合杜牧未精審一時趂筆之過也蓋吳既滅即沉西施於江浮沉也反言耳隨鴟夷者子胥之譖死西施有力焉胥死盛以鴟夷今沉西施所以報子胥之忠故云隨鴟夷以終范蠡去越亦號鴟夷子杜牧遂以子胥鴟夷為范蠡之鴟夷乃影撰此事以墮後人於疑網也既又自笑曰范蠡不幸遇杜牧受誣千載又何幸遇豫而雪之亦一快哉唐陸廣微吳地記云嘉興縣一百里有女兒亭勾踐令范蠡取西施以獻夫差西施於路與范蠡潛通三年始達於吳遂生一子至此亭其子一歲能言因名女兒亭越絶書云西施亡吳國後復歸范蠡因泛五湖而去觀此則逸篇寧非影撰耶王元美云楊陳之證西施俱各有所出難以臆斷第陳引吳地記云云此大可笑夫蠡必不為此事語兒者就李也晦伯之駁用修可謂夢中説夢矣按吳地記其書見存楊謂逸篇者出何典記耶余謂其影撰故引以正之耳元美不能逆志而云各有所出殆夢中説夢之後更寱語耶更列子云禾生伯子出行經坰外宿於田更更訓老老而更事也漢立三老五更義取此張湛注列子乃云更當作叟誤矣困學紀聞三老五更按列子云禾生子伯宿於田更商丘聞之舍更亦老之稱也已先言之矣孝經援神契云尊三老者父象也五更寵以度禮祭義養三老五更于太學所以教諸侯弟也又食三老云云史記西門豹治鄴投三老于河應劭漢官儀曰三老五更三代所尊也史正義云百官表云十里一亭亭有長十亭一鄉鄉有三老掌教化皆秦制也曰漢立三老五更當别有見蔡雍云更當為叟叟老人之稱也重違孔藂子載孔子高謂平原君曰重違公子盛旨漢書孔光傳重違大臣正義東坡朝錯論又重違其意重難也言難違其意而勉從之也近世不達此語以重為重大之重失之矣孔藂抗志篇云衛公子交饋馬四乘於子思曰禮雖有爵賜人不踰父兄今重違公子之盛旨則有失禮之僣焉若何謂子高謂平原君或今本誤鬼谷子漢書蓻文志鬼容區三篇注即鬼臾區也郊祀志黃帝得寶鼎冕侯問於鬼臾區云云注即鬼容區容臾聲相近今按鬼谷即鬼容者又字相似而誤也高似孫子略便謂蓻文志無鬼谷子何其輕於立論乎史記注鄭玄云鬼臾區黃帝佐也史記云鬼谷先生蘇秦張儀之師也今以為谷區豈見鬼耶儀秦亦豈黃帝時人耶拾遺記鬼谷子云吾生於歸谷亦曰鬼谷鬼者歸也又曰歸者谷名也古史考云鬼谷子也歸鬼相近也栁子云漢劉向班固録書無鬼谷子鬼谷子後出妄言亂世難信今誚子略栁子亦未見耶度轂韓非子云顔回明仁於度轂程嬰顯義於趙武上句不知事之所出度轂似是人姓名度姓古有之宋有度正蜀之遂寧人此後漢書崔駰達旨語也曰韓子誤秀才趙武靈王論胡服云俗辟民易則是吳越無秀才也秀才之名始此後再見於賈誼傳六朝遂以此為取士之科名云史記趙武靈王云且服竒者志淫則是鄒魯無竒行也俗辟者民易則是吳越無秀士也戰國䇿是吳越無俊民也無秀才字君主妻河史記年表秦始以君主妻河君主秦君之女其曰君主猶後世公主也妻河沉之河水如河伯娶妻故事蓋戎俗也吕東萊作大事記不達君主之義改主為生又改生作甥失之逺矣是以君子無貴鑿也史年表秦靈公八年初以君公妻河索隱曰謂初以此年取他女為君主君主猶公主也妻河謂嫁之河伯故魏俗猶為河伯取婦蓋其遺風殊異其事故云初此注自明伯恭豈不見之或傳寫之誤改甥者何人别號戰國䇿秦惠王時有寒泉子注云秦處士之號史記索隱云甘茂居渭南隂鄉之樗里故號曰樗里子又范蠡去越自稱鴟夷子此固後人别號之所昉乎史記樗里子者名疾秦惠王之弟也滑稽多知武王時與甘茂為左右丞相室在於昭王廟西渭南隂鄉樗里故俗謂之樗里子索隱即引為注楚䇿甘茂與樗里疾貿首之讎也謂茂號樗里誤史記范蠡自謂鴟夷子皮今止云鴟夷子亦誤萬歲夜姚寬戰國䇿注博引諸書以證之用心亦至矣然猶有遺也楚䇿楚王遊雲夢謂安陵君曰樂矣今日之遊寡人千秋萬歲後誰與樂此矣安陵君泣下數行曰萬歲夜願以身試黃泉蓐螻蟻夜如左傳注窀穸厚夜之夜最見人臣不敢斥言之意今本改夜作後不見古人立言之妙矣戰國䇿云楚王遊於雲夢仰天而嘆曰樂矣今日之遊也寡人萬歲千秋之後誰與樂此矣安陵君泣下數行而進曰臣入則編席出則陪乘大王萬歲千秋之後願得以身試黃泉蓐螻蟻又何如得此樂而樂之王大説此文自明夜字如何安置豈所見又古本耶韓非子引諺風雅遺篇奔車之上無仲尼覆舟之下無伯夷此見韓子安危篇非諺也何與呵通賈誼過秦論信臣精卒陳利兵而誰何注誰何問之也漢書有誰何卒如淳曰何謂何官也按他注解誰與譙通與高帝譙讓項羽之譙同莊子盛鶴列於麗譙之間譙謂出入城門而譙呵問之如今之盤詰守關之例何與呵通莊子注麗譙髙樓名一作嶕謂華麗而嶕嶢漢書陳勝傳戰譙門中師古曰門上為高樓以望也樓一名譙故謂美麗之樓為麗譙譙亦呼為巢所謂巢車者亦謂兵車之上為樓以望敵也漢書漢王謝羽鴻門項莊舞劔樊噲直入羽壯之賜以酒噲因譙讓羽此謂高帝譙讓項羽誤索隱云崔浩云何或為呵漢舊儀宿衛郎官分五夜誰呵呵夜行者誰也何呵字同如淳曰何猶問也據此則何呵同矣誰與譙同出何注乎邯鄲才人嫁為厮養卒婦南中集豫觀樂府有邯鄲才人嫁為厮養卒婦篇特亡其辭亦失其解及考史記張耳傳洎楚漢春秋并云趙王武臣為燕軍所獲囚於燕獄先後使者往請輒為燕所殺趙有厮養卒謝其舍中曰吾將載趙王歸舍中人笑之乃走燕壁以利害説燕將燕以為然乃歸趙王厮養卒御王以歸武臣歸趙以美人妻養卒以報之是其事也豫觀養卒有戰國䇿士之風太史公書其事文既竒樂府歌其事亦竒矣六朝及唐人擬作者皆似眯目道黑白雖吾鄉太白亦迷其源昔吾亡友何仲默一日讀焦仲卿妻樂府謂豫曰古今惟此一篇更無第二篇也凡歌辭簡則古此篇愈繁愈古子庶幾焉可作一篇與此相對豫謝未遑然亦未有兹竒事直當之也去今二十年屏居滇雲平晝無事散帙見此事思與仲卿事適類復憶仲默言乃操觚試為之以成此篇惜不使仲默見之永昌張愈光亦仲默文字友也遂往一通以寄愈光云李子田云邯鄲才人嫁為厮養卒婦楊用修引張耳傳厮養卒説燕王事云是此卒且曰古今作者如眯目道黑白雖吾鄉太白亦昧其源因撰一古風長篇謂可方焦仲卿妻然張耳傳祗云厮養卒並無才人嫁為婦語曷以知所嫁者即此卒耶張耳傳非隱書古今人所同喻豈得云通不檢此人皆眯目耶且古人作樂府多襲舊題變出新意曷欲定掇本事耶凡此諸不可通而詩之佳否姑勿及也此事史漢并同注中俱無楚漢春秋字假之以欺人可耳乃首言史記何耶其詩有云春禖燕乙乙曉寢蟲􅖇􅖇説文云乙燕燕玄鳥也齊魯謂之乙不云乙乙也文選文賦思乙乙其若抽善注乙乙難出之貌説文曰隂氣尚強其出乙乙然徐曰乙乙未展也今指為燕對蟲恐誤又云黃鵠悲陶嬰蝴蝶怨韓馮搜神記韓馮事乃鴛鴦非蝴蝶也不知梁祝肯借用否耶古歲字作遂古歲字即歲時之遂今文遂字從步從戌年至戌而終乃秦人以十月為歲首故制字以步戌前此未有也宋姚孝寧已辨之豫觀史記注引陸賈楚漢春秋云三老董公八十二遂封為成侯遂即歲也陸賈著書不用秦篆而用古文亦卓士哉崔希裕略古篇古歲字作歲未詳其義然亦可證步戌之為秦制而非古矣史記注雖有此句詳其文義遂字屬下句詎可指此遂為歲耶白虎通曰所以名為歲者何歲者遂也三百六十六日一周天萬物畢死故為一歲也爾雅夏曰歲取歲星行一次也歲星行一次而四時之功畢故年謂之歲從步者躔度可推步也從戌者木星之精生於亥自亥行至於戌而周天也毛居正六經正誤律書注按律書注伶倫取嶰谷之竹陽律六取雄竹吹之隂律吕六取雌竹吹之今律書及律厯志併無此注蓋雄鳴雌鳴誤之耳吕覽説苑及晉書等志俱無雄竹雌竹之事宋玉笛賦云衡山之陽見竒篠異幹良工至此曰命陪乘取其雄焉得其雌焉遂以為笛七始丹鉛閏録漢書律厯志引古文尚書豫欲聞六律五聲八音七始詠以出納五言今文七始詠作在治忽史繩祖據漢郊祀歌七始華始肅倡和聲而以今文在治忽近于附會以豫考之此言聲律音韻是一類事但漢書注不著七始之義今之切韻宫商角徵羽之外又有半商半徵蓋牙齒舌唇喉之外有深喉淺喉二音此即所謂七始詠詠即韻也汗簡𨽻古七始作夾始蓋古人七作􅀢􅀢與夾相近而誤尤可驗史氏之説為是由此言之切韻之法自舜世已然不起於西域胡僧又可知豫特表出之孟康云七始者天地四時人也此説乃意料之言漢書志曰豫欲聞六律云云五言汝聽言以律吕和五聲施之八音合之成樂七者天地四時人之始也順以歌詠五常之言史記索隱古文尚書作在治忽今文作采政忽此本志自明謂注無七始之義孟康意料之言俱誤七始華始安世房中歌也云郊祀歌又誤其切韻云云不必辨三河唐詩天子三河募少年三河黃河也折支河也湟中河也史記高帝紀發關內兵收三河士韋昭曰河南河東河內貨殖傳河東河內河南在天地之中阮藉詩蘇子狹三河沈注云河南河北河東秦之三川郡今指定三河之名誤青雲史記云伯夷叔齊雖賢得夫子而名益彰顔淵雖篤學附驥尾而行益顯閭巷之人欲砥行立名者非附青雲之士烏能施於後世哉青雲之士謂聖賢立言傳世者孔子是也附青雲則伯夷顔淵是也後世謂登仕路為青雲謬矣試引數條以證之京房易占青雲所覆其下有賢人隱續逸民傳嵇康早有青雲之志南史𢎞景年十四五歲見葛洪方書便有養生之志曰仰青雲覩白日不為逺矣梁孔稚圭隱居多搆山泉衡陽王鈞往遊之圭曰殿下處朱門遊紫闥詎得與山人交耶鈞曰身處朱門而情遊滄海形入紫闥而意在青雲又袁彖贈隱士庾易詩曰白日清明青雲遼亮昔聞巢許今覩臺尚阮籍詩抗身青雲中網羅孰能施李太白詩獵客張兔罝不能挂龍虎所以青雲人高歌在巖户合而觀之青雲豈仕進之謂乎王勃文窮且益堅不墮青雲之志即論語視富貴如浮雲之旨若窮而常有覬覦富貴之心則鄙夫而已矣自宋人用青雲字於登科詩中遂誤至今不改史記須賈見范雎頓首言死罪曰賈不意君能自致於青雲之上揚雄解嘲云當途者升青雲失路者委溝渠宋書劉瑀答何偃云一蹙直造青雲何至與駑馬爭路晉書載記史臣曰劉元海人傑必致青雲之上是以䇿馬騫鳴乘機豹變五部高嘯一旦推雄南史齊衡陽王鈞與會稽孔圭問答云云見衡陽王道度傳非梁也唐僧廣宣寄賀王超放第二榜詩便向青雲領貢賔胡苑張良對高祖言長安形勝曰南有巴蜀之饒北有胡苑之利史記漢書皆不解胡苑之義後人或改苑作戎非也按漢官儀引郎中侯應之言曰隂山東西千餘里單于之苑囿也又胡人歌曰失我燕支山令我婦女無顔色失我祁連山令我六畜不蕃息所謂胡苑之利當是此義史記注索隱云苑馬牧外接胡地馬生於胡故云胡苑之利正義曰博物志云北有胡苑之塞按上郡北地之北與胡接可以牧養禽獸又多致胡馬故謂胡苑之利也今云無解誤其歌引西河故事之誤姑勿及也先其祘命漢書律厯志劉歆條奏引書曰先其祘命師古曰逸書也言王者統業先立算數以命百事也祘古算字近俗本改祘作算而俗士不知算命之義又顚倒其字作先算其命成何語言似星士招牌矣可笑也又可惡也凡古書有古字不可輕改若依古作祘則人雖罕識而識之者必博古士也未必妄改作先算其命也他如斠若畫一通鑑改斠作較不知斠勘斗斛也較車耳也其義殊逺左親戚去墳墓通鑑改左作離運籌帷帳通鑑改帳作幄陳平雖美如冠玉耳其中未必有也冠玉下去一耳字便失其指皆是為拙工廢繩墨聊舉一二其餘更僕窮紙不能數也律厯志云數者一十百千萬也所以算數事物順性命之理也書曰先其算命師古曰云云不作祘字史記蕭何為法顜若畫一徐廣曰顜音古項反一音較索隱曰漢書顜作講講一作覯小顔曰講和也未見斠字張良傳天下遊士離其親戚去墳墓帷帳漢書作帷幄史自序傳同俱非通鑑所改也陸賈素馨陸賈南中行紀雲南中百花惟素馨香特酷烈彼中女子以綵絲穿花心繞髻為飾梁章隱詠素馨花詩云細花穿弱縷盤向緑雲鬟用陸語也花繞髻之飾至今猶然豫嘗有詩云金碧佳人墮馬粧鷓鴣林裏採秋芳穿花貫縷盤香雪會把風流惱陸郎薑夢賓笑謂豫曰不意陸賈風流之案千年而始發耶廣東志云廣州有花田平田彌望皆植素馨花南征録云南漢主劉隱時美人死葬於此至今花香異於他處或云隱之女其花舊名悉那茗因生於素馨冢上故名陸賈西漢初即預知南漢死女事真異人哉嵇含南方草木狀云那悉茗末利花皆胡人自西國移植於南海南人憐其芳香競植之陸賈南越行紀云南越之境五谷無味百花不香此二花特芳香者緣自胡國移至不隨水土而變與夫橘化為枳異矣彼之女子以綵絲穿花心以為首飾史記賈兩使尉他皆廣州也其行紀安得著雲南花哉且此時漢尚未通滇南安得云云哉史記引諺用貧求富農不如工工不如商刺繡文不如倚市門史貨殖傳夫用貧云云市門此言業末貧者之資也不云諺也漢書作諺云玄的史記五宗世家程姬有所避不願進注引釋名云天子諸侯羣妾以次進御有月事者更不口説故以丹注面的為識令女史見之又馬之當額亦曰的易説卦為的顙三國志有的盧又烏脰亦曰的南史侯景陷臺城童謠云的脰烏拂朱雀還與吳易為的顙解曰的白也升菴本經詎忘之耶三國志注先主馬名的盧爾雅的顙白顚今之戴星馬也額有白毛謂之的相馬經曰馬白額入口至齒者名曰榆雁一名的盧奴乘客死主乘棄市三國典略曰侯景令飾朱雀門其日有白頭烏萬計集門樓童謡曰白頭烏拂朱雀還與吳南史作的脰今以馬額烏脰為的誤若如其説則幽明録云華隆犬號的尾是的又可為犬尾矣東方朔傳引古語風雅逸篇水至清則無魚人至察則無徒漢書本傳故曰水至清云云文選無故曰字未必古語也若以故曰字為古語則前有云故曰時異事異何不表出耶韓非子隰子曰古者有諺曰知淵中之魚者不祥武帝賢良䇿引古語良玉不琢董仲舒傳制曰夫帝王之道豈異指哉或曰良玉不琢又曰非文無以輔德今曰古語何遺下句耶天馬歌天馬歌天馬徠厯無草草即皂字從草從早草字可染皂也後借為皂𨽻之皂厯解為槽櫪之厯言其性安馴不煩控制也師古解為水草之草失之漢志云天馬來厯無草徑千里循東道張晏曰馬從西而來東也師古曰言馬從西來經行磧鹵之地無草者凡千里而至東道據歌中上下文意馬尚未至安得即説槽櫪且染皂何施又云皂𨽻之皂將用以控此馬乎殊不可曉西河舊事曰廣武郡有馬蹄谷漢武帝聞大宛有天馬遣李廣利伐之始得此馬漢武為賦天馬之歌云云胡馬感北風之思遂頓羈絶絆驤首而馳晨發京城食時至燉煌北塞山下嘶鳴而去因名其處為候馬亭俗號曰天馬徑觀此天馬之性其安馴有如此者蝦蟆陵白樂天詩自言本是京城女家在蝦蟆陵下住蝦蟆陵在長安謝良輔詩取酒蝦蟆陵下家家守歲傳巵齊巳詩翠樓春酒蝦蟆陵長安少年皆共矜國史補曰董仲舒墓門人至皆下馬故謂之下馬陵諺訛為蝦蟆陵志云常樂坊內家東有大冢俗誤以為仲舒墓亦呼為蝦蟆陵曲中出美酒京都稱之韋述兩京記亦以為仲舒墓又國史補云抹漢武帝幸芙蓉園即秦之宜春苑也每至此墓下馬時人謂之下馬陵歲月深逺誤為蝦蟆陵爾約法三章漢書與父老約句法三章耳殺人者死傷人及盜抵罪今皆讀作約法三章是何理也困學紀聞云漢書高帝與父老約為句下云法三章耳唐高祖入京師約法十二條蓋放此語而失之用修之言蓋本此耳漢天文志漢王入秦與秦民約法三章民無不歸心者可謂能行義矣文紀宋昌云漢興除秦苛煩約法令施德惠人人自安刑法志漢興高祖初入關約法三章曰殺人云云蠲削苛煩兆民大悅其後兵革未息三章之約不足以禦姦又云漢興之初雖有約法三章網漏吞舟之魚然其大辟尚有夷三族之令高祖初順人心作三章之約紀末漢明帝時楊終上疏云高祖平亂約法三章大宗至仁除去收拏後漢章帝後有輕侮之法和帝即位張敏駁議曰臣聞師言救文莫如質故高帝去煩苛之法為三章之約安帝時尚書陳忠寬尹次史玊殺人之罪應劭追駁之議曰高祖入關雖尚約法然殺人者死亦無寬降後漢王充等論三章在令貴取能約荀悅漢紀沛公與秦人約法三章殺人者死傷人者刑及盜抵罪魏志陳矯傳周有三典之制漢約三章之法郭沖五事云法正謂諸葛云昔高祖入關約法三章秦民知德孔明傳注世説云魏顗初宦虞存嘲之曰與卿約法三章符健與百姓約法三章薄賦卑宫乘心政事晉載記宋書云蕭道成馳檄數沈攸之罪曰今皇上聖明將相仁厚約法三章輕刑緩賦梁書袁昻謝梁武啓曰幸約法之𢎞承解網之宥三季之弊由於煩刑大德之興在於三約魏刑法志北齊書樊遜外中紀號對曰使百姓一覩六軍若逢司隸然後除其苛令與其約法武帝詔曰漢王約法除其苛政姬王輕典刑彼新邦周書漢高以三章之約以慰秦人隋刑法志唐書將軍王玄榮殺其縣令肅宗將宥之韋陟曰昔漢高約法殺人者死今殺人者生恐非所宜按約法字兩漢書皆同相去不逺其得於傳授者必真也漢紀復無耳字更章章明甚故晉宋隋唐史册中亦相承無異今特標立異説謂是何理豈前人俱誤耶近見刻史記者又尊信表章之以誤後學豈於前諸史略不經目耶陸賈春秋後語陸賈所著賈在漢初頗有文藻自新語外有春秋後語南中行紀又著感春賦盛引典誥今雖不傳而文心雕龍載其目實為上林子虛之先鞭孔衍以戰國䇿所書未為盡善乃引史記參其異同聚為一書號為春秋後語史通文心銓賦篇云漢初詞人順流而作陸賈扣其端才略篇云漢室陸賈首發竒采賦孟春而選典誥其辨之富矣賈所著楚漢春秋孟春賦也云後語感春誤馮夫人錦車漢書西域傳馮夫人名嫽漢宫人也善史書乘錦車持節和戎而歸按此事甚竒而六朝唐人無入篇詠者此事可畫可歌賢於詠明妃之失節文姬之傷化多矣漢元封中以江都王建女細君為公主妻烏孫昆莫年老以公主妻其孫岑陬公主死漢以楚王戊之孫解憂為公主妻岑陬陬死翁歸靡復尚楚主初楚主侍者馮嫽能史書習事嘗持漢節為公主使行賞賜于城郭諸國敬信之號曰馮夫人為烏孫右大將妻大將與烏就屠相愛都護鄭吉使馮夫人説烏就屠降漢烏就屠恐曰願得小號宣帝徵馮夫人自問狀遣謁者送馮夫人馮夫人錦車持節詔立烏就屠等皆賜印綬此豈和戎而歸耶云可畫可歌何耶嚴子陵范曄嚴光傳以光為餘姚人而云少與光武同學光武何嘗至餘姚哉曄著任延傳云延會稽都尉到郡先詢延陵季子時天下新定道路未通避亂江南者皆未還中土如董子儀嚴子陵等帥皆待以師友之禮則子陵僑居避亂江南明矣又按故迹遺文有嚴光碑云子陵新野人避亂江南娶梅福女因居會稽以此考之與任延傳相合高士傳光餘姚人少有高名同光武遊學及帝即位乃變易姓名隱逝不見范書同紀云光武王莽天鳯中之長安受尚書光傳子陵與光武同遊學乃去一遊字云光武何嘗至餘姚謂文叔不至餘姚似也光獨不可之長安耶任延傳延更始元年拜會稽都尉及到先遣饋禮祠延陵季子時避亂江南者皆未還中土會稽頗稱多士延到皆聘請高行如董子儀嚴子陵等敬待以師友之禮夫季子吳人傳云饋祠此云先詢豈札猶存耶光為餘姚人本傳自明乃去會稽頗稱多士之句指為僑居何耶漢書梅福九江壽春人少學長安補南昌尉後去官歸壽春居家常以讀書養性為事至元始中王莽顓政福一朝棄妻子去九江至今傳以為仙其後人有見福于會稽者變姓名為吳市門卒云漢地理志會稽郡縣二十六其一曰吳注周太伯所邑則福于會稽為吳市之門卒非即今紹興之會稽也云娶福女因居會稽然耶夫福棄妻子去矣豈獨攜女而行變姓名矣誰復知其有女妻光耶且光之避亂當王莽之未延之禮光在更始之初福棄家去則平帝時也相去已二十餘年計福固已老矣可必其有季女耶金石古文公所輯也古迹遺文既有子陵碑何為而不收入耶又云碑與延傳相合是果相合否耶蓋亦鼎文鄦字意耳沙漠沙幕兩音漢書武帝元朔六年衛青將六將軍絶幕注沙土白幕今按幕漫也西域傳難睨國以銀為錢文為騎馬幕如人面如淳曰幕音漫韋昭曰幕錢背也靈棋經十二棋子皆隂謂之純隂漫然則漫幕同義李陵歌曰徑萬里兮度沙漠注此胸奴沙漫地崔浩謂之河底猶今人呼帳幔亦曰幕可依字讀義無爽今按京師謂錢背曰漫兒呼帳面曰㡢子則沙漠與絶幕作漫莫兩音皆通巵言西域傳罽賓國東北至難兜國九日行以金銀云云如淳曰幕音漫師古曰幕即漫耳無勞借音以罽賓為難睨以兜為睨俱誤亦無韋昭注武紀絶幕應劭曰幕沙幕胸奴之南界瓚曰沙土曰幕師古曰幕者即今之突厥中磧耳又按紀元狩四年衛青將四將軍出定襄至幕北圍單于元封元年遣使告單于曰何但亡匿幕北寒苦之地為則南界為是蘇武傳李陵置酒賀武歌曰徑萬里兮度沙幕為君將兮奮胸奴下原無注復自為注何耶韻會古漠幕字通用幔或作幕正楊卷二
