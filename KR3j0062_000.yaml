  text: 欽定四庫全書子部十
  hash: sha256:6558828ce7672044657017b2bb9c6172233a999f18551baa91b8fd0e67ea1b4b
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3j0062_WYG_000-1a, image: WYG0856/WYG0856-0047a.png}
body:
  text: 正楊雜家類三雜考之屬提要臣等謹案正楊四卷明陳耀文撰耀文有經典稽疑己著録是書凡一百五十條皆糾楊慎之訛成于隆慶己巳前有李蓘序及耀文自序慎於正德嘉靖之間以博學稱而所作丹鉛録諸書不免瑕瑜並見真偽互陳又晚謫永昌無書可檢惟憑記憶未免多疏耀文考正其非不使轉滋疑誤於學者不為無功然釁起爭名語多攻訐醜詞惡謔無所不加雖古人挾怨搆爭如吳縝之糾新唐書者亦不至是殊乖著作之體又書成之後王世貞頗有違言耀文復增益其書反唇辨難語同詬詈憤若冦讐觀是書者取其博贍亦不可不戒其浮囂也朱國楨湧幢小品曰有丹鉛録諸書便有正楊又有正正楊古人古事古字此書如彼彼書如此散見雜出各不相同見其一不見其二閧然糾駁不免為前人所笑是亦善於解紛之説然博辨者固戒遊詞精核者終歸定論國楨之病是書竟欲舉考證而廢之則又矯枉過直矣乾隆四十九年八月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀正楊原序余觀升菴氏書而深嘆立言之難也夫世之稱升菴者不曰正平一覽則云管綜百氏即其自視也固已前無古人後無來者今兹所見才數種耳乃訛盩自相違伐若此豈率爾師心在大方之家爾邪抑參菁並蓄傳載者無藎臣耶故知舛駁無事於五車麟角取裁於四百矣余明興傳疑者衆間為是正數條持布鼓以過雷門不覺失笑葉生梨之更為博笑也夫隆慶己巳孟冬望天中筆山山人陳耀文書於敦悅堂近世推博辨多蓄曰成都楊用修用修著丹鉛餘録等書至數十百種搜竒抉譎擷采鈎隱皆世所驟聞而學士大夫所望而駭歎者以是聲譽籍甚從同無異詞顧余峕峕窺其謬盩或事非幽邈而掩為祕藏或異本殊途而牽為同致以是不了其故豈大觀者定小有遺耶抑簡册浩窅獨智難周耶韓退之稱張巡抽架上書皆成口誦初不見其讀書而張安世劉貢父之在當時雖以歐蘇之名猶不許以博古固知學之道難矣而用修者所謂未見其止也乎今朗陵陳君晦伯間取其誤謬分疏其下得一百五十條悉撮原本無假辨説開卷瞭然固談藝者之一快也孟子輿云不直則道不見吕伯恭云待人欲恕論人欲盡君鋭情紬索多所校讐聊相與直之盡之耳亦楚人亡弓之遺意也隆慶三年歲在己巳夏四月草五日順陽李蓘子田甫謹纂
